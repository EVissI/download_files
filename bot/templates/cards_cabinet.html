<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
            color: #e8e8e8;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        .wrap {
            padding: 16px;
            padding-bottom: 84px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Смартфоны: 7vh; планшеты: 5vh — блок над контентом (статус-бар / жесты) */
        @media (max-width: 600px) {
            .cabinet-top-spacer {
                width: 100%;
                height: 7vh;
                min-height: 24px;
                flex-shrink: 0;
                pointer-events: none;
            }
        }

        @media (min-width: 601px) and (max-width: 1024px) {
            .cabinet-top-spacer {
                width: 100%;
                height: 5vh;
                min-height: 24px;
                flex-shrink: 0;
                pointer-events: none;
            }
        }

        @media (min-width: 1025px) {
            .cabinet-top-spacer {
                display: none;
            }
        }

        h1 {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0;
            text-align: center;
        }
        .cabinet-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            margin: 0 0 12px;
            min-height: 34px;
            gap: 8px;
        }
        .cabinet-header-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .cabinet-shuffle-btn,
        .cabinet-id-toggle-btn,
        .cabinet-mode-btn,
        .cabinet-send-btn,
        .cabinet-link-btn,
        .cabinet-admin-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #4a4a4a;
            border-radius: 8px;
            background: #2d2d2d;
            color: #ddd;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            line-height: 1;
            text-decoration: none;
            padding: 0;
        }
        .cabinet-shuffle-btn:active,
        .cabinet-id-toggle-btn:active,
        .cabinet-mode-btn:active,
        .cabinet-send-btn:active,
        .cabinet-link-btn:active,
        .cabinet-admin-btn:active {
            background: #3a3a3a;
        }

        .cabinet-id-toggle-btn {
            width: auto;
            min-width: 96px;
            padding: 0 10px;
            font-size: 0.74rem;
        }
        .cabinet-id-toggle-btn.is-active {
            border-color: #5f8fbd;
            background: #3e6f9f;
            color: #fff;
        }
        .cabinet-mode-btn,
        .cabinet-send-btn,
        .cabinet-link-btn,
        .cabinet-folder-add-btn,
        .cabinet-admin-btn {
            display: none;
        }
        .cabinet-mode-btn,
        .cabinet-send-btn,
        .cabinet-link-btn,
        .cabinet-folder-add-btn {
            width: auto;
            min-width: 88px;
            padding: 0 10px;
            font-size: 0.78rem;
        }
        .cabinet-mode-btn.is-visible,
        .cabinet-send-btn.is-visible,
        .cabinet-link-btn.is-visible,
        .cabinet-folder-add-btn.is-visible,
        .cabinet-admin-btn.is-visible {
            display: inline-flex;
        }
        .cabinet-mode-btn.is-active {
            border-color: #5f8fbd;
            background: #3e6f9f;
            color: #fff;
        }
        .cabinet-send-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .cabinet-link-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .cabinet-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 190000;
            background: rgba(26, 26, 26, 0.95);
            border-top: 1px solid #3e3e3e;
            backdrop-filter: blur(4px);
        }
        .cabinet-footer__inner {
            max-width: 480px;
            margin: 0 auto;
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cabinet-footer .cabinet-id-toggle-btn,
        .cabinet-footer .cabinet-mode-btn,
        .cabinet-footer .cabinet-send-btn,
        .cabinet-footer .cabinet-link-btn,
        .cabinet-footer .cabinet-folder-add-btn {
            flex: 1 1 0;
            min-width: 0;
            justify-content: center;
        }
        .cabinet-folder-add-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .link-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 220000;
        }
        .link-modal.is-open {
            display: flex;
        }
        .link-modal__overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
        }
        .link-modal__box {
            position: relative;
            width: min(92vw, 430px);
            background: #20242b;
            border: 1px solid #3e4552;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        }
        .link-modal__title {
            margin: 0 0 10px;
            font-size: 1rem;
        }
        .link-modal__input {
            width: 100%;
            box-sizing: border-box;
            border-radius: 10px;
            border: 1px solid #4a5362;
            background: #161b22;
            color: #e8edf5;
            padding: 10px 12px;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .link-modal__msg {
            min-height: 18px;
            margin: 0;
            font-size: 12px;
            color: #9fb2c9;
        }
        .link-modal__actions {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .link-modal__btn {
            border: 1px solid #4b5565;
            border-radius: 9px;
            background: #2f3742;
            color: #ecf2ff;
            padding: 8px 12px;
            cursor: pointer;
        }
        .link-modal__btn:active {
            background: #394455;
        }
        .link-modal__btn--primary {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }
        .link-modal__btn--primary:active {
            background: #2563eb;
        }
        .link-modal__subtitle {
            margin: 0 0 10px;
            font-size: 12px;
            color: #9fb2c9;
        }
        .cabinet-footer .cabinet-quick-select-input {
            display: none;
            flex: 2 1 0;
            min-width: 0;
            background: #1f2329;
            color: #fff;
            border: 1px solid #3f4550;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 12px;
            outline: none;
            box-sizing: border-box;
        }
        .cabinet-footer .cabinet-quick-select-input.is-visible {
            display: block;
        }
        .cabinet-footer .cabinet-quick-select-input.is-invalid {
            border-color: #cb6363;
            box-shadow: 0 0 0 1px rgba(203, 99, 99, 0.35) inset;
        }
        .cabinet-footer .cabinet-hints-toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            padding: 4px 8px;
            color: #ddd;
            font-size: 0.78rem;
            line-height: 1;
            cursor: pointer;
            user-select: none;
            flex: 1 1 0;
            min-width: 0;
            justify-content: center;
            border: 1px solid #4a4a4a;
            border-radius: 8px;
            background: #2d2d2d;
            min-height: 28px;
            box-sizing: border-box;
        }
        .cabinet-footer .cabinet-hints-toggle__input {
            width: 14px;
            height: 14px;
            margin: 0;
            accent-color: #5f8fbd;
            cursor: pointer;
            flex-shrink: 0;
        }
        .cabinet-footer .cabinet-hints-toggle__label {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cabinet-footer .cabinet-hints-toggle:has(.cabinet-hints-toggle__input:checked) {
            border-color: #5f8fbd;
            background: #3e6f9f;
            color: #fff;
        }

        .hint {
            font-size: 0.85rem;
            color: #9a9a9a;
            margin-bottom: 16px;
        }
        .search-wrap {
            margin-bottom: 14px;
            display: grid;
            grid-template-columns: minmax(0, 50%) minmax(0, 50%);
            align-items: center;
            gap: 14px;
        }
        .search-input {
            width: 100%;
            background: #232323;
            color: #f0f0f0;
            border: 1px solid #3c3c3c;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            outline: none;
        }
        .search-input:focus {
            border-color: #5f8fbd;
        }
        .status-filter-wrap {
            width: 100%;
            display: flex;
            justify-content: flex-end;
        }
        .status-filter-select {
            width: 90%;
            background: #2b2b2b;
            color: #f0f0f0;
            border: 1px solid #454545;
            border-radius: 10px;
            padding: 10px 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }
        .status-filter-select:focus {
            border-color: #5f8fbd;
        }
        .label-filter-wrap {
            grid-column: 1 / -1;
            display: none;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .label-filter-wrap.is-visible {
            display: flex;
        }
        .label-filter-select {
            width: 62%;
            background: #2b2b2b;
            color: #f0f0f0;
            border: 1px solid #454545;
            border-radius: 10px;
            padding: 10px 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }
        .label-filter-select:focus {
            border-color: #5f8fbd;
        }
        .label-presets-open-btn {
            display: none;
            border: 1px solid #6b5b2a;
            background: #3a3420;
            color: #fde68a;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .label-presets-open-btn.is-visible {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .label-presets-open-btn:active {
            background: #4a4228;
        }

        .err {
            color: #ff8a80;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 10px;
        }

        .tile {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 10px;
            font-size: 1.35rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, border-color 0.15s;
        }

        .tile:active {
            background: #3d5a80;
            border-color: #5a7aaa;
        }
        .tile--viewed {
            background: #3e6f9f;
            border-color: #5f8fbd;
        }
        .tile--solved {
            background: #2f8f4f;
            border-color: #58ba7a;
        }
        .tile--favorite {
            background: #b7902a;
            border-color: #dbb54f;
        }
        .tile--hard {
            background: #a43b3b;
            border-color: #cb6363;
        }
        .tile--recent {
            background: #ffffff;
            border-color: #d9d9d9;
            color: #111111;
        }
        .tile--selected {
            box-shadow: 0 0 0 2px #7fbeff inset;
            border-color: #7fbeff;
        }

        .tile-wrap {
            position: relative;
            aspect-ratio: 1;
        }
        .tile-wrap > .tile {
            width: 100%;
            height: 100%;
            aspect-ratio: unset;
            box-sizing: border-box;
        }
        .tile__del {
            position: absolute;
            top: 2px;
            right: 2px;
            z-index: 2;
            width: 20px;
            height: 20px;
            border: 0;
            border-radius: 6px;
            background: rgba(30, 30, 30, 0.85);
            color: #f5b4b4;
            font-size: 0.85rem;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .tile__del:active {
            background: rgba(60, 30, 30, 0.95);
        }

        .tile--create {
            background: transparent;
            border: 2px dashed #666;
            color: #9a9a9a;
            font-size: 2rem;
            font-weight: 400;
            line-height: 1;
        }
        .tile--create:active {
            background: rgba(61, 90, 128, 0.2);
            border-color: #5a7aaa;
            color: #c8d8ef;
        }

        .empty {
            color: #888;
            font-size: 0.95rem;
        }
        .shuffle-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200000;
        }
        .shuffle-modal.is-open {
            display: flex;
        }
        .shuffle-modal__overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }
        .shuffle-modal__box {
            position: relative;
            width: 92%;
            max-width: 420px;
            background: #262a30;
            border: 1px solid #3f4550;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            box-sizing: border-box;
        }
        .shuffle-modal__title {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 600;
        }
        .shuffle-modal__label {
            display: block;
            margin: 0 0 6px;
            font-size: 13px;
            color: #cfd7e3;
        }
        .shuffle-modal__input {
            width: 100%;
            background: #1f2329;
            color: #fff;
            border: 1px solid #3f4550;
            border-radius: 8px;
            padding: 9px 10px;
            margin-bottom: 10px;
            outline: none;
            box-sizing: border-box;
        }
        .shuffle-modal__statuses {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px 10px;
            margin-bottom: 10px;
        }
        .shuffle-modal__status-row {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #e7edf7;
        }
        .shuffle-modal__msg {
            min-height: 18px;
            margin: 0 0 10px;
            font-size: 13px;
            color: #f4b567;
        }
        .shuffle-modal__actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }
        .shuffle-modal__btn {
            border: 1px solid #4a505b;
            background: #353b45;
            color: #fff;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
        }
        .shuffle-modal__btn--primary {
            border-color: #5f8fbd;
            background: #3e6f9f;
        }
        .assign-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 210000;
        }
        .assign-modal.is-open {
            display: flex;
        }
        .assign-modal__overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }
        .assign-modal__box {
            position: relative;
            width: 94%;
            max-width: 720px;
            max-height: 88vh;
            overflow: hidden;
            background: #262a30;
            border: 1px solid #3f4550;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .assign-modal__title {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 600;
        }
        .assign-modal__label {
            display: block;
            margin: 0 0 6px;
            font-size: 13px;
            color: #cfd7e3;
        }
        .assign-modal__input {
            width: 100%;
            background: #1f2329;
            color: #fff;
            border: 1px solid #3f4550;
            border-radius: 8px;
            padding: 9px 10px;
            margin-bottom: 10px;
            outline: none;
            box-sizing: border-box;
        }
        .assign-modal__msg {
            min-height: 18px;
            margin: 0 0 10px;
            font-size: 13px;
            color: #f4b567;
        }
        .assign-modal__table-wrap {
            max-height: 320px;
            overflow: auto;
            border: 1px solid #3f4550;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .assign-modal__table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .assign-modal__table th,
        .assign-modal__table td {
            padding: 7px 8px;
            border-bottom: 1px solid #3b414b;
            text-align: left;
            vertical-align: top;
        }
        .assign-modal__table tbody tr {
            cursor: pointer;
            transition: background 0.15s;
        }
        .assign-modal__table tbody tr:hover {
            background: #2f3640;
        }
        .assign-modal__table tbody tr.is-selected {
            background: #365775;
        }
        .assign-modal__table tbody tr:last-child td {
            border-bottom: 0;
        }
        .assign-modal__actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }
        .assign-modal__btn {
            border: 1px solid #4a505b;
            background: #353b45;
            color: #fff;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
        }
        .assign-modal__btn--primary {
            border-color: #5f8fbd;
            background: #3e6f9f;
        }
        .assign-modal__btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .presets-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 220000;
        }
        .presets-modal.is-open {
            display: flex;
        }
        .presets-modal__overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }
        .presets-modal__box {
            position: relative;
            width: 92%;
            max-width: 520px;
            max-height: 82vh;
            overflow: hidden;
            background: #262a30;
            border: 1px solid #3f4550;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .presets-modal__title {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }
        .presets-modal__msg {
            min-height: 18px;
            margin: 0;
            font-size: 13px;
            color: #f4b567;
        }
        .presets-modal__input-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
        }
        .presets-modal__input {
            width: 100%;
            background: #1f2329;
            color: #fff;
            border: 1px solid #3f4550;
            border-radius: 8px;
            padding: 9px 10px;
            outline: none;
            box-sizing: border-box;
        }
        .presets-modal__input:focus {
            border-color: #5f8fbd;
        }
        .presets-modal__add-btn {
            border: 1px solid #5f8fbd;
            background: #3e6f9f;
            color: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            white-space: nowrap;
        }
        .presets-modal__list {
            max-height: 320px;
            overflow: auto;
            border: 1px solid #3f4550;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-content: flex-start;
        }
        .presets-modal__chip {
            border: 1px solid #5a6473;
            background: #323842;
            color: #e9eef7;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: default;
            user-select: text;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .presets-modal__chip-remove {
            border: 0;
            background: transparent;
            color: #f5b4b4;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 0;
        }
        .presets-modal__empty {
            color: #a7b0bf;
            font-size: 13px;
        }
        .presets-modal__actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .presets-modal__btn {
            border: 1px solid #4a505b;
            background: #353b45;
            color: #fff;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
        }

        .cabinet-gallery-modal {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 225000;
        }
        .cabinet-gallery-modal.is-open {
            display: block;
        }
        .cabinet-gallery-modal__overlay {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: #141414;
        }
        .cabinet-gallery-modal__box {
            position: absolute;
            inset: 0;
            z-index: 1;
            width: auto;
            height: auto;
            min-height: 100%;
            box-sizing: border-box;
            overflow: hidden;
            background: #262a30;
            border: none;
            border-radius: 0;
            padding: calc(44px + env(safe-area-inset-top, 0px))
                calc(10px + env(safe-area-inset-right, 0px))
                calc(12px + env(safe-area-inset-bottom, 0px))
                calc(10px + env(safe-area-inset-left, 0px));
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .cabinet-gallery-modal__toolbar {
            position: absolute;
            z-index: 3;
            top: calc(8px + env(safe-area-inset-top, 0px));
            right: calc(8px + env(safe-area-inset-right, 0px));
            left: auto;
            display: inline-flex;
            flex-direction: row-reverse;
            align-items: center;
            gap: 8px;
        }
        @media (max-width: 600px) {
            .cabinet-gallery-modal__toolbar {
                top: calc(8px + env(safe-area-inset-top, 0px) + 10vh);
            }
        }
        @media (min-width: 601px) and (max-width: 1024px) {
            .cabinet-gallery-modal__toolbar {
                top: calc(8px + env(safe-area-inset-top, 0px) + 5vh);
            }
        }
        @media (min-width: 1025px) {
            .cabinet-gallery-modal__toolbar {
                top: calc(8px + env(safe-area-inset-top, 0px) + 3vh);
            }
        }
        .cabinet-gallery-modal__close,
        .cabinet-gallery-modal__upload-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #4a505b;
            border-radius: 8px;
            background: #353b45;
            color: #fff;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
        }
        .cabinet-gallery-modal__close {
            font-size: 1.25rem;
        }
        .cabinet-gallery-modal__close:active,
        .cabinet-gallery-modal__upload-btn:active {
            background: #3d4550;
        }
        .cabinet-gallery-modal__upload-btn {
            display: none;
        }
        .cabinet-gallery-modal__box.is-admin .cabinet-gallery-modal__upload-btn {
            display: inline-flex;
        }
        .cabinet-gallery-modal__upload-btn svg {
            display: block;
        }
        .cabinet-gallery-modal__scroll {
            flex: 1 1 0;
            min-height: 0;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .cabinet-gallery-modal__viewer {
            flex: 1 1 0;
            min-height: 0;
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 8px;
            box-sizing: border-box;
        }
        .cabinet-gallery-modal__nav {
            flex: 0 0 auto;
            align-self: center;
            width: 40px;
            height: 40px;
            border: 1px solid #4a505b;
            border-radius: 10px;
            background: #353b45;
            color: #fff;
            font-size: 1.35rem;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .cabinet-gallery-modal__nav:active:not(:disabled) {
            background: #3d4550;
        }
        .cabinet-gallery-modal__nav:disabled {
            opacity: 0.32;
            cursor: default;
        }
        .cabinet-gallery-modal__stage-wrap {
            flex: 1 1 0;
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-sizing: border-box;
        }
        .cabinet-gallery-modal__stage {
            flex: 1 1 0;
            min-height: 0;
            min-width: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .cabinet-gallery-modal__counter {
            margin: 0;
            flex-shrink: 0;
            font-size: 13px;
            color: #a7b0bf;
            text-align: center;
        }
        .cabinet-gallery-modal__cell {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            min-width: 0;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            overflow: visible;
            background: transparent;
            border: 1px solid #3b414b;
            isolation: isolate;
            cursor: pointer;
        }
        .cabinet-gallery-modal__cell img {
            display: block;
            width: auto;
            height: auto;
            max-width: min(100%, 1100px);
            max-height: min(70vh, 820px);
            object-fit: contain;
            object-position: center;
            background: #121418;
            cursor: pointer;
            border-radius: 8px;
        }
        .cabinet-gallery-modal__del {
            position: absolute;
            top: 4px;
            right: 4px;
            z-index: 2;
            width: 26px;
            height: 26px;
            border: 0;
            border-radius: 8px;
            background: rgba(30, 30, 30, 0.82);
            color: #f5b4b4;
            font-size: 1rem;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .cabinet-gallery-modal__del:active {
            background: rgba(50, 30, 30, 0.9);
        }
        .cabinet-gallery-modal__msg {
            margin: 0;
            min-height: 0;
            flex-shrink: 0;
            font-size: 12px;
            color: #f4b567;
            display: none;
        }
        .cabinet-gallery-modal__msg.is-visible {
            display: block;
        }
        .cabinet-gallery-modal__empty {
            min-height: 48px;
            width: 100%;
            align-self: center;
        }

        /* ===== Folders (picker + manage) ===== */
        .folders-modal {
            position: fixed; inset: 0; z-index: 100090;
            display: none; align-items: flex-end;
        }
        .folders-modal.is-open { display: flex; }
        .folders-modal__overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,.45);
        }
        .folders-modal__box {
            position: relative; z-index: 1;
            width: 100%; max-height: 75dvh;
            background: var(--tg-theme-bg-color, #18181b);
            border-radius: 18px 18px 0 0;
            display: flex; flex-direction: column;
        }
        .folders-modal__header {
            display: flex; align-items: center; gap: 8px;
            padding: 14px 16px 8px;
            border-bottom: 1px solid rgba(255,255,255,.07);
        }
        .folders-modal__title {
            flex: 1; margin: 0; font-size: 16px; font-weight: 600;
            color: var(--tg-theme-text-color, #fff);
        }
        .folders-modal__subtitle {
            font-size: 12px; color: var(--tg-theme-hint-color, #aaa);
            padding: 0 16px 8px;
        }
        .folders-modal__close {
            background: none; border: none; cursor: pointer;
            color: var(--tg-theme-hint-color, #aaa);
            font-size: 20px; padding: 4px;
        }
        .folders-modal__top {
            padding: 0 16px 8px;
        }
        .folders-modal__top button {
            padding: 8px 14px; border-radius: 8px; border: none;
            background: var(--tg-theme-button-color, #3b82f6);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 13px; cursor: pointer;
        }
        .folders-modal__msg {
            padding: 0 16px 6px; font-size: 12px; min-height: 16px;
            color: var(--tg-theme-hint-color, #aaa);
        }
        .folders-modal__tree {
            flex: 1; overflow-y: auto; padding: 4px 12px 12px;
        }
        .folders-modal__footer {
            display: flex; gap: 8px; padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid rgba(255,255,255,.07);
        }
        .folders-modal__footer button {
            flex: 1; padding: 10px; border-radius: 10px; border: none;
            font-size: 14px; cursor: pointer;
        }
        .folders-modal__footer button:disabled {
            opacity: .45; cursor: not-allowed;
        }
        .folders-modal__footer .folders-modal__btn-primary {
            background: var(--tg-theme-button-color, #3b82f6);
            color: var(--tg-theme-button-text-color, #fff);
        }
        .folders-modal__footer .folders-modal__btn-secondary {
            background: rgba(255,255,255,.08);
            color: var(--tg-theme-text-color, #fff);
        }
        .folder-node__row {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 8px; border-radius: 8px; cursor: pointer;
        }
        .folder-node__row:hover { background: rgba(255,255,255,.05); }
        .folder-node.is-selected > .folder-node__row {
            background: rgba(59,130,246,.2);
        }
        .folder-node__toggle {
            width: 16px; font-size: 10px; color: var(--tg-theme-hint-color,#aaa);
            flex-shrink: 0; text-align: center;
        }
        .folder-node__name {
            flex: 1; font-size: 14px; color: var(--tg-theme-text-color, #fff);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .folder-node__count {
            font-size: 11px; color: var(--tg-theme-hint-color, #aaa);
        }
        .folder-node__children {
            padding-left: 18px; display: none;
        }
        .folder-node.is-expanded > .folder-node__children { display: block; }
        .folder-node__actions {
            display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0;
        }
        .folder-node__action {
            border: none; background: rgba(255,255,255,.08);
            color: var(--tg-theme-text-color, #fff);
            border-radius: 6px; padding: 4px 8px;
            font-size: 11px; cursor: pointer; line-height: 1.2;
        }
        .folder-node__action:active { background: rgba(255,255,255,.14); }
        .folder-node__action--danger {
            background: transparent; color: var(--tg-theme-hint-color, #aaa);
            font-size: 16px; padding: 2px 6px;
        }
        .folder-view-bar {
            display: none; flex-wrap: wrap; gap: 8px;
            align-items: center; margin: 0 0 12px; padding: 0 2px;
        }
        .folder-view-bar.is-visible { display: flex; }
        .folder-view-bar__subfolders {
            display: flex; flex-wrap: wrap; gap: 6px; flex: 1;
        }
        .folder-view-bar__chip {
            border: 1px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.06);
            color: var(--tg-theme-text-color, #fff);
            border-radius: 8px; padding: 6px 10px;
            font-size: 13px; cursor: pointer;
        }
        .folder-view-bar__add {
            border: 1px dashed rgba(255,255,255,.25);
            background: transparent;
            color: var(--tg-theme-hint-color, #aaa);
            border-radius: 8px; padding: 6px 12px;
            font-size: 13px; cursor: pointer;
        }
        #manage-folders-btn { display: none; }
        #manage-folders-btn.is-visible { display: inline-flex; }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="cabinet-top-spacer" aria-hidden="true"></div>
        <div class="cabinet-header">
            <div class="cabinet-header-actions">
                <button id="shuffle-cards-btn" class="cabinet-shuffle-btn" type="button" title="Перемешать карточки" aria-label="Перемешать карточки">⇄</button>
                <button id="cabinet-gallery-btn" class="cabinet-shuffle-btn" type="button" title="Галерея" aria-label="Галерея">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M4 7.5C4 6.12 5.12 5 6.5 5h3l1.2 1.5H17.5A2.5 2.5 0 0 1 20 9v9.5A2.5 2.5 0 0 1 17.5 21h-11A2.5 2.5 0 0 1 4 18.5v-11Z" stroke="currentColor" stroke-width="1.65" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <h1>Мои карточки</h1>
            <div class="cabinet-header-actions">
                <button id="cabinet-interactive-stats-btn" class="cabinet-shuffle-btn" type="button" title="Статистика интерактива" aria-label="Статистика интерактива">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M5 20V10M12 20V4M19 20v-8" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button id="manage-folders-btn" class="cabinet-shuffle-btn" type="button" title="Список папок" aria-label="Список папок">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M3 7.5C3 6.12 4.12 5 5.5 5h3.38l1.5 2H18.5A2.5 2.5 0 0 1 21 9.5v9A2.5 2.5 0 0 1 18.5 21h-13A2.5 2.5 0 0 1 3 18.5v-11Z" stroke="currentColor" stroke-width="1.65" stroke-linejoin="round"/>
                    </svg>
                </button>
                <a id="admin-fab-btn" class="cabinet-admin-btn" href="/admin" title="Перейти в админку" aria-label="Перейти в админку">A</a>
            </div>
        </div>
        <div class="search-wrap">
            <input
                id="card-search"
                class="search-input"
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="Поиск по номеру карточки"
                autocomplete="off"
            >
            <div class="status-filter-wrap">
                <select id="status-filter" class="status-filter-select" title="Фильтр по статусу">
                    <option value="">Все статусы</option>
                    <option value="RECENT">Недавно добавленные</option>
                    <option value="UNVIEWED">Не просмотренные</option>
                    <option value="VIEWED">Просмотренные</option>
                    <option value="SOLVED">Решенные</option>
                    <option value="FAVORITE">Избранные</option>
                    <option value="HARD">Сложные</option>
                </select>
            </div>
            <div id="label-filter-wrap" class="label-filter-wrap">
                <select id="label-filter" class="label-filter-select" title="Фильтр по метке">
                    <option value="">Все метки</option>
                </select>
                <button id="label-presets-open-btn" class="label-presets-open-btn" type="button" title="Открыть пресеты меток" aria-label="Открыть пресеты меток">Пресеты</button>
            </div>
        </div>
        <div id="err" class="err" style="display:none;"></div>
        <div id="folder-view-bar" class="folder-view-bar" aria-hidden="true">
            <div id="folder-view-subfolders" class="folder-view-bar__subfolders"></div>
            <button id="folder-view-add-subfolder" class="folder-view-bar__add" type="button" style="display:none;">+ Подпапка</button>
        </div>
        <div id="grid" class="grid"></div>
    </div>
    <div id="labelPresetsModalCabinet" class="presets-modal" aria-hidden="true">
        <div id="labelPresetsModalCabinetOverlay" class="presets-modal__overlay"></div>
        <div class="presets-modal__box" role="dialog" aria-modal="true" aria-labelledby="labelPresetsModalCabinetTitle">
            <h3 id="labelPresetsModalCabinetTitle" class="presets-modal__title">Пресеты меток</h3>
            <div class="presets-modal__input-row">
                <input id="labelPresetsModalCabinetInput" class="presets-modal__input" type="text" maxlength="255" placeholder="Новый пресет для всех" autocomplete="off">
                <button id="labelPresetsModalCabinetAddBtn" type="button" class="presets-modal__add-btn">Добавить</button>
            </div>
            <p id="labelPresetsModalCabinetMsg" class="presets-modal__msg"></p>
            <div id="labelPresetsModalCabinetList" class="presets-modal__list" aria-live="polite"></div>
            <div class="presets-modal__actions">
                <button id="labelPresetsModalCabinetCloseBtn" type="button" class="presets-modal__btn">Закрыть</button>
            </div>
        </div>
    </div>
    <!-- Список папок -->
    <div id="folderManageModal" class="folders-modal" aria-hidden="true">
        <div id="folderManageModalOverlay" class="folders-modal__overlay"></div>
        <div class="folders-modal__box" role="dialog" aria-modal="true">
            <div class="folders-modal__header">
                <h3 class="folders-modal__title">Папки</h3>
                <button id="folderManageModalClose" class="folders-modal__close" type="button" aria-label="Закрыть">✕</button>
            </div>
            <p id="folderManageMsg" class="folders-modal__msg"></p>
            <div id="folderManageTree" class="folders-modal__tree"></div>
        </div>
    </div>

    <footer class="cabinet-footer">
        <div class="cabinet-footer__inner">
            <button id="id-toggle-btn" class="cabinet-id-toggle-btn" type="button" title="Переключить вид ID карточек" aria-label="Переключить вид ID карточек">ID</button>
            <input id="quick-select-input" class="cabinet-quick-select-input" type="text" inputmode="text" placeholder="11,22,25-30" title="Быстрое выделение: 11,22,25-30" autocomplete="off">
            <button id="select-mode-btn" class="cabinet-mode-btn" type="button" title="Режим выделения карточек" aria-label="Режим выделения карточек">Обычный режим</button>
            <button id="add-to-folder-btn" class="cabinet-folder-add-btn" type="button" title="Создать папку с выделенными карточками" aria-label="Создать папку с выделенными карточками" disabled>В папку</button>
            <button id="generate-link-btn" class="cabinet-link-btn" type="button" title="Получить одноразовую ссылку" aria-label="Получить одноразовую ссылку" disabled>Ссылка</button>
            <button id="send-selected-btn" class="cabinet-send-btn" type="button" title="Отправить выбранные карточки" aria-label="Отправить выбранные карточки" disabled>Отправить</button>
            <label id="open-hints-toggle-wrap" class="cabinet-hints-toggle" title="Показывать на карточках интерактивные блоки выбора лучшего хода">
                <input id="open-hints-toggle" type="checkbox" class="cabinet-hints-toggle__input">
                <span class="cabinet-hints-toggle__label">Открыть подсказки</span>
            </label>
        </div>
    </footer>
    <div id="generateLinkModal" class="link-modal" aria-hidden="true">
        <div id="generateLinkModalOverlay" class="link-modal__overlay"></div>
        <div class="link-modal__box" role="dialog" aria-modal="true" aria-labelledby="generateLinkModalTitle">
            <h3 id="generateLinkModalTitle" class="link-modal__title">Одноразовая ссылка</h3>
            <input id="generateLinkModalInput" class="link-modal__input" type="text" readonly>
            <p id="generateLinkModalMsg" class="link-modal__msg"></p>
            <div class="link-modal__actions">
                <button id="generateLinkModalCloseBtn" type="button" class="link-modal__btn">Закрыть</button>
                <button id="generateLinkModalCopyBtn" type="button" class="link-modal__btn">Скопировать</button>
            </div>
        </div>
    </div>
    <div id="folderNameModal" class="link-modal" aria-hidden="true">
        <div id="folderNameModalOverlay" class="link-modal__overlay"></div>
        <div class="link-modal__box" role="dialog" aria-modal="true" aria-labelledby="folderNameModalTitle">
            <h3 id="folderNameModalTitle" class="link-modal__title">Новая папка</h3>
            <p id="folderNameModalSubtitle" class="link-modal__subtitle"></p>
            <input
                id="folderNameModalInput"
                class="link-modal__input"
                type="text"
                maxlength="255"
                placeholder="Название папки"
                autocomplete="off"
            >
            <p id="folderNameModalMsg" class="link-modal__msg"></p>
            <div class="link-modal__actions">
                <button id="folderNameModalCancelBtn" type="button" class="link-modal__btn">Отмена</button>
                <button id="folderNameModalSubmitBtn" type="button" class="link-modal__btn link-modal__btn--primary">Создать</button>
            </div>
        </div>
    </div>
    <div id="shuffleModal" class="shuffle-modal" aria-hidden="true">
        <div class="shuffle-modal__overlay" id="shuffleModalOverlay"></div>
        <div class="shuffle-modal__box" role="dialog" aria-modal="true" aria-labelledby="shuffleModalTitle">
            <h3 id="shuffleModalTitle" class="shuffle-modal__title">Случайная выборка карточек</h3>
            <label for="shuffleCountInput" class="shuffle-modal__label">Сколько карточек показать</label>
            <input id="shuffleCountInput" class="shuffle-modal__input" type="number" min="1" step="1" inputmode="numeric" placeholder="Например, 20">
            <div class="shuffle-modal__label">Статусы для выборки</div>
            <div class="shuffle-modal__statuses">
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="UNVIEWED" checked>Не просмотренные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="RECENT" checked>Недавно добавленные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="VIEWED" checked>Просмотренные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="SOLVED" checked>Решенные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="FAVORITE" checked>Избранные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="HARD" checked>Сложные</label>
            </div>
            <p id="shuffleModalMsg" class="shuffle-modal__msg"></p>
            <div class="shuffle-modal__actions">
                <button type="button" id="shuffleModalResetBtn" class="shuffle-modal__btn">Сбросить</button>
                <button type="button" id="shuffleModalCancelBtn" class="shuffle-modal__btn">Отмена</button>
                <button type="button" id="shuffleModalApplyBtn" class="shuffle-modal__btn shuffle-modal__btn--primary">Применить</button>
            </div>
        </div>
    </div>
    <div id="interactiveStatsModal" class="shuffle-modal" aria-hidden="true">
        <div class="shuffle-modal__overlay" id="interactiveStatsModalOverlay"></div>
        <div class="shuffle-modal__box" role="dialog" aria-modal="true" aria-labelledby="interactiveStatsModalTitle">
            <h3 id="interactiveStatsModalTitle" class="shuffle-modal__title">Интерактив «лучший ход»</h3>
            <p id="interactiveStatsModalBody" class="shuffle-modal__msg" style="min-height: 48px; color: #e8e8e8;"></p>
            <div class="shuffle-modal__actions">
                <button type="button" id="interactiveStatsModalCloseBtn" class="shuffle-modal__btn shuffle-modal__btn--primary">Закрыть</button>
            </div>
        </div>
    </div>
    <div id="cabinetGalleryModal" class="cabinet-gallery-modal" aria-hidden="true">
        <div id="cabinetGalleryModalOverlay" class="cabinet-gallery-modal__overlay"></div>
        <div id="cabinetGalleryModalBox" class="cabinet-gallery-modal__box" role="dialog" aria-modal="true" aria-label="Галерея" tabindex="-1">

            /** На части клиентов Telegram (в т.ч. Desktop) initData может появиться позже tg.ready(). */
            function waitForTelegramWebAppInitData(maxMs, stepMs) {
                maxMs = typeof maxMs === 'number' ? maxMs : 5000;
                stepMs = typeof stepMs === 'number' ? stepMs : 50;
                if (fabToken) {
                    return Promise.resolve('');
                }
                var tg = window.Telegram && window.Telegram.WebApp;
                if (!tg) {
                    return Promise.resolve('');
                }
                var cur = tg.initData || '';
                if (cur) {
                    return Promise.resolve(cur);
                }
                try {
                    if (typeof tg.ready === 'function') {
                        tg.ready();
                    }
                } catch (_e) {}
                return new Promise(function (resolve) {
                    var t0 = Date.now();
                    function tick() {
                        var v = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) || '';
                        if (v) {
                            resolve(v);
                            return;
                        }
                        if (Date.now() - t0 >= maxMs) {
                            resolve('');
                            return;
                        }
                        setTimeout(tick, stepMs);
                    }
                    tick();
                });
            }

            function saveCabinetState() {
                try {
                    var payload = {
                        search: String(searchInput ? (searchInput.value || '') : ''),
                        status: String(statusFilter ? (statusFilter.value || '') : ''),
                        label: String(labelFilter ? (labelFilter.value || '') : ''),
                        isDbIdMode: !!isDbIdMode,
                    };
                    localStorage.setItem(cabinetStateKey, JSON.stringify(payload));
                } catch (_e) {}
            }

            function restoreCabinetState() {
                try {
                    var raw = localStorage.getItem(cabinetStateKey);
                    if (!raw) return;
                    var state = JSON.parse(raw);
                    if (searchInput && state && typeof state.search === 'string') {
                        searchInput.value = state.search.replace(/\D+/g, '');
                    }
                    if (statusFilter && state && typeof state.status === 'string') {
                        statusFilter.value = state.status;
                    }
                    if (state && typeof state.label === 'string') {
                        pendingLabelFilterValue = state.label;
                    }
                    isDbIdMode = !!(state && state.isDbIdMode);
                } catch (_e) {}
            }

            function applyPendingLabelFilterValue() {
                if (!labelFilter) return;
                if (!pendingLabelFilterValue) {
                    labelFilter.value = '';
                    return;
                }
                var hasOption = Array.from(labelFilter.options || []).some(function (opt) {
                    return String(opt.value || '') === pendingLabelFilterValue;
                });
                labelFilter.value = hasOption ? pendingLabelFilterValue : '';
            }

            function getCardDisplayId(row) {

                    quickSelectInput.placeholder = isDbIdMode ? '101,205,300-315' : '11,22,25-30';

            waitForTelegramWebAppInitData(5000, 50).then(function (resolvedInitData) {

                    showErr('Откройте страницу из Telegram или через FAB-мост.');

                restoreCabinetState();

            function authPayload(extra) {
                var base = {};
                if (initData) {
                    base.init_data = initData;

                    base.fab_token = fabToken;
                }
                if (extra && typeof extra === 'object') {
                    Object.keys(extra).forEach(function (k) { base[k] = extra[k]; });
                }
                return base;

            function syncCabinetGalleryNav() {
                var n = galleryItemsList.length;
                if (cabinetGalleryCounter) {
                    cabinetGalleryCounter.textContent = n ? String(gallerySlideIndex + 1) + ' / ' + String(n) : '';
                }
                if (cabinetGalleryPrev) {
                    cabinetGalleryPrev.disabled = !n || gallerySlideIndex <= 0;
                }
                if (cabinetGalleryNext) {
                    cabinetGalleryNext.disabled = !n || gallerySlideIndex >= n - 1;
                }

            function updateCabinetGallerySlide() {
                if (!cabinetGalleryGrid) return;
                cabinetGalleryGrid.innerHTML = '';
                if (!galleryItemsList.length) {
                    var empty = document.createElement('div');
                    empty.className = 'cabinet-gallery-modal__empty';
                    empty.setAttribute('aria-hidden', 'true');
                    cabinetGalleryGrid.appendChild(empty);
                    syncCabinetGalleryNav();
                    return;
                }
                if (gallerySlideIndex < 0) {
                    gallerySlideIndex = 0;
                }
                if (gallerySlideIndex >= galleryItemsList.length) {
                    gallerySlideIndex = galleryItemsList.length - 1;
                }
                var it = galleryItemsList[gallerySlideIndex];
                var key = it && it.key;
                if (!key) {
                    galleryItemsList.splice(gallerySlideIndex, 1);
                    if (gallerySlideIndex >= galleryItemsList.length) {
                        gallerySlideIndex = Math.max(0, galleryItemsList.length - 1);
                    }
                    updateCabinetGallerySlide();
                    return;
                }
                var cell = document.createElement('div');
                cell.className = 'cabinet-gallery-modal__cell';
                cell.dataset.s3Key = key;
                var img = document.createElement('img');
                img.alt = '';
                img.loading = gallerySlideIndex === 0 ? 'eager' : 'lazy';
                img.src = '/api/content_cards/media?' + new URLSearchParams({ key: key }).toString();
                cell.appendChild(img);
                if (galleryCanManage) {
                    var del = document.createElement('button');
                    del.type = 'button';
                    del.className = 'cabinet-gallery-modal__del';
                    del.setAttribute('aria-label', 'Удалить');
                    del.textContent = '\u00d7';
                    del.addEventListener('click', function (ev) {
                        ev.preventDefault();
                        ev.stopPropagation();
                        deleteCabinetGalleryItem(key);
                    });
                    cell.appendChild(del);
                }
                cabinetGalleryGrid.appendChild(cell);
                syncCabinetGalleryNav();
            }

            function goCabinetGalleryPrev() {
                if (gallerySlideIndex > 0) {
                    gallerySlideIndex -= 1;

            function goCabinetGalleryNext() {
                if (gallerySlideIndex < galleryItemsList.length - 1) {

            function renderCabinetGalleryGrid(items) {

                        if (row && row.key) {
                            galleryItemsList.push(row);
                        }
                    }
                }
                gallerySlideIndex = 0;
                updateCabinetGallerySlide();
            }

            function copyTextViaTextarea(text) {
                return new Promise(function (resolve, reject) {
                    try {
                        var value = String(text || '');
                        if (!value) {
                            reject(new Error('Пустая строка для копирования.'));
                            return;
                        }
                        var ta = document.createElement('textarea');
                        ta.value = value;
                        ta.setAttribute('readonly', '');
                        ta.style.position = 'fixed';
                        ta.style.left = '-9999px';
                        ta.style.top = '0';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.focus();
                        ta.select();
                        if (typeof ta.setSelectionRange === 'function') {
                            ta.setSelectionRange(0, value.length);
                        }
                        var ok = document.execCommand('copy');
                        document.body.removeChild(ta);
                        if (!ok) {
                            reject(new Error('execCommand copy failed'));
                            return;
                        }
                        resolve();
                    } catch (e) {
                        reject(e);
                    }
                });
            }

            function copyTextToClipboard(text) {
                var value = String(text || '');
                if (!value) {
                    return Promise.reject(new Error('Пустая строка для копирования.'));
                }
                if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                    return navigator.clipboard.writeText(value).catch(function () {
                        return copyTextViaTextarea(value);
                    });
                }
                return copyTextViaTextarea(value);
            }

            function copyGalleryDeepLinkToClipboard(url, onOk, onFail) {
                copyTextToClipboard(url).then(onOk).catch(onFail);
            }

            function notifyGalleryLinkCopiedToClipboard() {
                var text = 'Ссылка скопирована в буфер обмена.';
                try {
                    var tg = window.Telegram && window.Telegram.WebApp;
                    if (tg && typeof tg.showAlert === 'function') {
                        tg.showAlert(text);
                    }
                } catch (_e) {}
                try {
                    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                } catch (_h) {}
            }

            function requestGalleryImageShareLink(s3Key) {
                if (galleryShareBusy || !s3Key) return;
                galleryShareBusy = true;
                setCabinetGalleryMsg('');
                fetch('/api/content_cards/cabinet_gallery/share_link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(authPayload({ s3_key: s3Key })),
                })
                    .then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (j) {
                                throw new Error((j && j.detail) || r.statusText);
                            }).catch(function () {
                                throw new Error('Ошибка');
                            });
                        }
                        return r.json();
                    })
                    .then(function (data) {
                        var link = data && data.start_link;
                        if (!link) {
                            throw new Error('Нет ссылки');
                        }
                        copyGalleryDeepLinkToClipboard(
                            link,
                            function () {
                                galleryShareBusy = false;
                                notifyGalleryLinkCopiedToClipboard();
                            },
                            function () {
                                galleryShareBusy = false;
                                setCabinetGalleryMsg('Не удалось скопировать: ' + link);
                            }
                        );
                    })
                    .catch(function (e) {
                        galleryShareBusy = false;
                        setCabinetGalleryMsg(e.message || String(e));
                    });
            }

            function deleteCabinetGalleryItem(key) {
                fetch('/api/content_cards/cabinet_gallery/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(authPayload({ key: key })),
                })
                    .then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (j) {
                                throw new Error((j && j.detail) || r.statusText);
                            }).catch(function () {
                                throw new Error('Ошибка');
                            });
                        }
                        return r.json();
                    })
                    .then(function () {
                        var removedIdx = -1;
                        for (var i = 0; i < galleryItemsList.length; i++) {
                            if (galleryItemsList[i] && galleryItemsList[i].key === key) {
                                removedIdx = i;
                                break;
                            }
                        }
                        if (removedIdx >= 0) {
                            galleryItemsList.splice(removedIdx, 1);
                        }
                        if (removedIdx >= 0 && removedIdx < gallerySlideIndex) {
                            gallerySlideIndex -= 1;
                        } else if (removedIdx >= 0 && removedIdx === gallerySlideIndex) {
                            if (gallerySlideIndex >= galleryItemsList.length) {
                                gallerySlideIndex = Math.max(0, galleryItemsList.length - 1);
                            }
                        }
                        updateCabinetGallerySlide();
                    })
                    .catch(function (e) {
                        setCabinetGalleryMsg(e.message || String(e));
                    });
            }

            function loadCabinetGalleryIntoModal() {
                if (!cabinetGalleryGrid) return;
                galleryCanManage = false;
                galleryItemsList = [];
                gallerySlideIndex = 0;
                updateCabinetGallerySlide();

                function collect(token, acc) {
                    return fetch('/api/content_cards/cabinet_gallery/list', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(authPayload({
                            continuation_token: token || undefined,
                            limit: 100,
                        })),
                    }).then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (j) {
                                throw new Error((j && j.detail) || r.statusText);
                            }).catch(function () {
                                throw new Error('Ошибка');
                            });
                        }
                        return r.json();
                    }).then(function (data) {
                        var items = (data && data.items) || [];
                        items.forEach(function (it) { acc.push(it); });
                        if (data && data.can_manage) {
                            galleryCanManage = true;
                        }
                        var nt = data && data.continuation_token;
                        if (nt) {
                            return collect(nt, acc);
                        }
                        return acc;
                    });
                }

                collect(null, []).then(function (allItems) {
                    if (cabinetGalleryModalBox) {
                        cabinetGalleryModalBox.classList.toggle('is-admin', !!galleryCanManage);
                    }
                    renderCabinetGalleryGrid(allItems);
                }).catch(function (e) {
                    setCabinetGalleryMsg(e.message || String(e));
                });
            }

            function openCabinetGalleryModal() {
                if (!cabinetGalleryModal || !cabinetGalleryGrid) return;
                galleryCanManage = false;
                cabinetGalleryModal.classList.add('is-open');
                cabinetGalleryModal.setAttribute('aria-hidden', 'false');

                    cabinetGalleryModalBox.classList.remove('is-admin');

                        cabinetGalleryModalBox.focus({ preventScroll: true });
                    }
                } catch (_f) {}
            }

            function uploadCabinetGalleryFiles(fileList) {
                if (!cabinetGalleryModalBox || !cabinetGalleryModalBox.classList.contains('is-admin')) {
                    return;
                }
                if (galleryUploadBusy) return;
                var files = Array.prototype.slice.call(fileList || []).filter(function (f) {
                    return f && /^image\//i.test(f.type || '');
                });
                if (!files.length) return;
                galleryUploadBusy = true;
                setCabinetGalleryMsg('');
                var i = 0;
                function next() {
                    if (i >= files.length) {
                        galleryUploadBusy = false;
                        loadCabinetGalleryIntoModal();
                        return;
                    }
                    var f = files[i];
                    i += 1;
                    var fd = new FormData();
                    if (initData) {
                        fd.append('init_data', initData);
                    } else if (fabToken) {
                        fd.append('fab_token', fabToken);
                    }
                    fd.append('file', f, f.name || 'image');
                    fetch('/api/content_cards/cabinet_gallery/upload', { method: 'POST', body: fd })
                        .then(function (r) {
                            if (!r.ok) {
                                return r.json().then(function (j) {
                                    throw new Error((j && j.detail) || r.statusText);
                                }).catch(function () {
                                    throw new Error('Ошибка загрузки');
                                });
                            }
                            return r.json();
                        })

            function parseQuickSelectionInput(raw) {
                var value = String(raw || '').trim();
                if (!value) return { valid: true, numbers: [] };
                var tokens = value.split(',');
                var out = [];
                for (var i = 0; i < tokens.length; i++) {
                    var token = String(tokens[i] || '').replace(/\s+/g, '');
                    if (!token) continue;
                    var mNum = token.match(/^\d+$/);
                    if (mNum) {
                        var numVal = Number(token);
                        if (!Number.isFinite(numVal) || numVal < 1) return { valid: false, numbers: [] };
                        out.push(numVal);
                        continue;
                    }
                    var mRange = token.match(/^(\d+)-(\d+)$/);
                    if (mRange) {
                        var a = Number(mRange[1]);
                        var b = Number(mRange[2]);
                        if (!Number.isFinite(a) || !Number.isFinite(b) || a < 1 || b < 1) {
                            return { valid: false, numbers: [] };
                        }
                        if (a > b) {
                            var tmp = a;
                            a = b;
                            b = tmp;
                        }
                        for (var n = a; n <= b; n++) out.push(n);
                        continue;
                    }
                    return { valid: false, numbers: [] };
                }
                var unique = {};
                var dedup = [];
                out.forEach(function (n) {
                    if (!unique[n]) {
                        unique[n] = true;
                        dedup.push(n);
                    }
                });
                return { valid: true, numbers: dedup };
            }

                if (!parsed.valid) {

                if (parsed.numbers.length) {
                    allCards.forEach(function (row) {

                            : Number((row && row.__index) || 0) + 1;

                        var cardIdNum = Number(row && row.content_card_id);
                        if (Number.isFinite(cardIdNum) && cardIdNum > 0) {

                if (!selectedAssignUserId) {
                    setAssignModalMsg('Выберите пользователя.');
                    return;
                }
                var selectedCards = getSelectedCardsInCabinetOrder();
                var selectedIds = selectedCards.map(function (row) { return row.id; });
                var numberByCardId = {};
                selectedCards.forEach(function (row) {
                    numberByCardId[String(row.id)] = row.number;
                });
                if (!selectedCards.length) {
                    setAssignModalMsg('Выберите хотя бы одну карточку.');
                    return;
                }

                function sendAssignRequest() {
                    return fetch('/api/content_cards/assign_to_user', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(
                            authPayload({
                                target_user_id: selectedAssignUserId,
                                content_card_ids: selectedIds,
                            })
                        ),
                    });
                }

                setAssignUsersLoadingState(true);
                fetch('/api/content_cards/assign_preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(
                        authPayload({
                            target_user_id: selectedAssignUserId,
                            content_card_ids: selectedIds,
                        })
                    ),
                })
                    .then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (j) {
                                throw new Error(j.detail || r.statusText);
                            }).catch(function () {
                                throw new Error('Ошибка проверки карточек');
                            });
                        }
                        return r.json();
                    })
                    .then(function (previewData) {
                        var alreadyHadIds = Array.isArray(previewData && previewData.already_had_ids)
                            ? previewData.already_had_ids
                            : [];
                        if (alreadyHadIds.length) {
                            var numberWithIdItems = alreadyHadIds
                                .map(function (cardId) {
                                    var n = numberByCardId[String(cardId)];
                                    if (!Number.isFinite(n)) {
                                        return null;
                                    }
                                    return {
                                        number: n,
                                        id: Number(cardId),
                                    };
                                })
                                .filter(function (row) { return !!row; })
                                .sort(function (a, b) { return a.number - b.number; })
                                .map(function (row) {
                                    return '№' + row.number + ' (id: ' + row.id + ')';
                                });
                            if (!numberWithIdItems.length) {
                                numberWithIdItems = alreadyHadIds.map(function (cardId) {
                                    return 'id: ' + cardId;
                                });
                            }
                            return openAlreadyHaveModal(numberWithIdItems).then(function (confirmed) {
                                if (!confirmed) {
                                    throw new Error('__PREVIEW_CANCELLED__');
                                }
                                return sendAssignRequest();
                            });
                        }
                        return sendAssignRequest();
                    })
                    .then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (j) {
                                throw new Error(j.detail || r.statusText);
                            }).catch(function () {
                                throw new Error('Ошибка отправки карточек');
                            });

                        return r.json();
                    })
                    .then(function (data) {
                        var issuedCount = Number((data && data.issued_count) || 0);
                        var alreadyHadCount = Number((data && data.already_had_count) || 0);
                        var invalidCount = Number((data && data.invalid_count) || 0);
                        var pieces = ['Выдано: ' + issuedCount + '.'];

                if (!window.confirm('Создать новую пустую карточку?')) {
