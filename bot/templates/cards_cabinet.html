<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
            color: #e8e8e8;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        .wrap {
            padding: 16px;
            padding-bottom: 84px;
            max-width: 480px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0;
            text-align: center;
        }
        .cabinet-header {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            margin: 0 0 12px;
            min-height: 34px;
            gap: 8px;
        }
        .cabinet-header-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .cabinet-shuffle-btn,
        .cabinet-id-toggle-btn,
        .cabinet-mode-btn,
        .cabinet-send-btn,
        .cabinet-admin-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #4a4a4a;
            border-radius: 8px;
            background: #2d2d2d;
            color: #ddd;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            line-height: 1;
            text-decoration: none;
            padding: 0;
        }
        .cabinet-shuffle-btn:active,
        .cabinet-id-toggle-btn:active,
        .cabinet-mode-btn:active,
        .cabinet-send-btn:active,
        .cabinet-admin-btn:active {
            background: #3a3a3a;
        }

        .cabinet-id-toggle-btn {
            width: auto;
            min-width: 96px;
            padding: 0 10px;
            font-size: 0.74rem;
        }
        .cabinet-id-toggle-btn.is-active {
            border-color: #5f8fbd;
            background: #3e6f9f;
            color: #fff;
        }
        .cabinet-mode-btn,
        .cabinet-send-btn,
        .cabinet-admin-btn {
            display: none;
        }
        .cabinet-mode-btn,
        .cabinet-send-btn {
            width: auto;
            min-width: 88px;
            padding: 0 10px;
            font-size: 0.78rem;
        }
        .cabinet-mode-btn.is-visible,
        .cabinet-send-btn.is-visible,
        .cabinet-admin-btn.is-visible {
            display: inline-flex;
        }
        .cabinet-mode-btn.is-active {
            border-color: #5f8fbd;
            background: #3e6f9f;
            color: #fff;
        }
        .cabinet-send-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .cabinet-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 190000;
            background: rgba(26, 26, 26, 0.95);
            border-top: 1px solid #3e3e3e;
            backdrop-filter: blur(4px);
        }
        .cabinet-footer__inner {
            max-width: 480px;
            margin: 0 auto;
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom, 0px));
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cabinet-footer .cabinet-id-toggle-btn,
        .cabinet-footer .cabinet-mode-btn,
        .cabinet-footer .cabinet-send-btn {
            flex: 1 1 0;
            min-width: 0;
            justify-content: center;
        }

        .hint {
            font-size: 0.85rem;
            color: #9a9a9a;
            margin-bottom: 16px;
        }
        .search-wrap {
            margin-bottom: 14px;
            display: grid;
            grid-template-columns: minmax(0, 60%) minmax(0, 40%);
            align-items: center;
            gap: 10px;
        }
        .search-input {
            width: 100%;
            background: #232323;
            color: #f0f0f0;
            border: 1px solid #3c3c3c;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            outline: none;
        }
        .search-input:focus {
            border-color: #5f8fbd;
        }
        .status-filter-wrap {
            width: 100%;
            display: flex;
            justify-content: flex-end;
        }
        .status-filter-select {
            width: 90%;
            background: #2b2b2b;
            color: #f0f0f0;
            border: 1px solid #454545;
            border-radius: 10px;
            padding: 10px 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }
        .status-filter-select:focus {
            border-color: #5f8fbd;
        }
        .label-filter-wrap {
            grid-column: 1 / -1;
            display: none;
            justify-content: flex-start;
        }
        .label-filter-wrap.is-visible {
            display: flex;
        }
        .label-filter-select {
            width: 60%;
            background: #2b2b2b;
            color: #f0f0f0;
            border: 1px solid #454545;
            border-radius: 10px;
            padding: 10px 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }
        .label-filter-select:focus {
            border-color: #5f8fbd;
        }

        .err {
            color: #ff8a80;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 10px;
        }

        .tile {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 10px;
            font-size: 1.35rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, border-color 0.15s;
        }

        .tile:active {
            background: #3d5a80;
            border-color: #5a7aaa;
        }
        .tile--viewed {
            background: #3e6f9f;
            border-color: #5f8fbd;
        }
        .tile--solved {
            background: #2f8f4f;
            border-color: #58ba7a;
        }
        .tile--favorite {
            background: #b7902a;
            border-color: #dbb54f;
        }
        .tile--hard {
            background: #a43b3b;
            border-color: #cb6363;
        }
        .tile--selected {
            box-shadow: 0 0 0 2px #7fbeff inset;
            border-color: #7fbeff;
        }

        .empty {
            color: #888;
            font-size: 0.95rem;
        }
        .shuffle-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200000;
        }
        .shuffle-modal.is-open {
            display: flex;
        }
        .shuffle-modal__overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }
        .shuffle-modal__box {
            position: relative;
            width: 92%;
            max-width: 420px;
            background: #262a30;
            border: 1px solid #3f4550;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            box-sizing: border-box;
        }
        .shuffle-modal__title {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 600;
        }
        .shuffle-modal__label {
            display: block;
            margin: 0 0 6px;
            font-size: 13px;
            color: #cfd7e3;
        }
        .shuffle-modal__input {
            width: 100%;
            background: #1f2329;
            color: #fff;
            border: 1px solid #3f4550;
            border-radius: 8px;
            padding: 9px 10px;
            margin-bottom: 10px;
            outline: none;
            box-sizing: border-box;
        }
        .shuffle-modal__statuses {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px 10px;
            margin-bottom: 10px;
        }
        .shuffle-modal__status-row {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #e7edf7;
        }
        .shuffle-modal__msg {
            min-height: 18px;
            margin: 0 0 10px;
            font-size: 13px;
            color: #f4b567;
        }
        .shuffle-modal__actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }
        .shuffle-modal__btn {
            border: 1px solid #4a505b;
            background: #353b45;
            color: #fff;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
        }
        .shuffle-modal__btn--primary {
            border-color: #5f8fbd;
            background: #3e6f9f;
        }
        .assign-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 210000;
        }
        .assign-modal.is-open {
            display: flex;
        }
        .assign-modal__overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }
        .assign-modal__box {
            position: relative;
            width: 94%;
            max-width: 720px;
            max-height: 88vh;
            overflow: hidden;
            background: #262a30;
            border: 1px solid #3f4550;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        .assign-modal__title {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 600;
        }
        .assign-modal__label {
            display: block;
            margin: 0 0 6px;
            font-size: 13px;
            color: #cfd7e3;
        }
        .assign-modal__input {
            width: 100%;
            background: #1f2329;
            color: #fff;
            border: 1px solid #3f4550;
            border-radius: 8px;
            padding: 9px 10px;
            margin-bottom: 10px;
            outline: none;
            box-sizing: border-box;
        }
        .assign-modal__msg {
            min-height: 18px;
            margin: 0 0 10px;
            font-size: 13px;
            color: #f4b567;
        }
        .assign-modal__table-wrap {
            max-height: 320px;
            overflow: auto;
            border: 1px solid #3f4550;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .assign-modal__table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .assign-modal__table th,
        .assign-modal__table td {
            padding: 7px 8px;
            border-bottom: 1px solid #3b414b;
            text-align: left;
            vertical-align: top;
        }
        .assign-modal__table tbody tr {
            cursor: pointer;
            transition: background 0.15s;
        }
        .assign-modal__table tbody tr:hover {
            background: #2f3640;
        }
        .assign-modal__table tbody tr.is-selected {
            background: #365775;
        }
        .assign-modal__table tbody tr:last-child td {
            border-bottom: 0;
        }
        .assign-modal__actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }
        .assign-modal__btn {
            border: 1px solid #4a505b;
            background: #353b45;
            color: #fff;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
        }
        .assign-modal__btn--primary {
            border-color: #5f8fbd;
            background: #3e6f9f;
        }
        .assign-modal__btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="cabinet-header">
            <div class="cabinet-header-actions">
                <button id="shuffle-cards-btn" class="cabinet-shuffle-btn" type="button" title="Перемешать карточки" aria-label="Перемешать карточки">⇄</button>
            </div>
            <h1>Мои карточки</h1>
            <div class="cabinet-header-actions">
                <a id="admin-fab-btn" class="cabinet-admin-btn" href="/admin" title="Перейти в админку" aria-label="Перейти в админку">A</a>
            </div>
        </div>
        <div class="search-wrap">
            <input
                id="card-search"
                class="search-input"
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="Поиск по номеру карточки"
                autocomplete="off"
            >
            <div class="status-filter-wrap">
                <select id="status-filter" class="status-filter-select" title="Фильтр по статусу">
                    <option value="">Все статусы</option>
                    <option value="UNVIEWED">Не просмотренные</option>
                    <option value="VIEWED">Просмотренные</option>
                    <option value="SOLVED">Решенные</option>
                    <option value="FAVORITE">Избранные</option>
                    <option value="HARD">Сложные</option>
                </select>
            </div>
            <div id="label-filter-wrap" class="label-filter-wrap">
                <select id="label-filter" class="label-filter-select" title="Фильтр по метке">
                    <option value="">Все метки</option>
                </select>
            </div>
        </div>
        <div id="err" class="err" style="display:none;"></div>
        <div id="grid" class="grid"></div>
    </div>
    <footer class="cabinet-footer">
        <div class="cabinet-footer__inner">
                <button id="id-toggle-btn" class="cabinet-id-toggle-btn" type="button" title="Переключить вид ID карточек" aria-label="Переключить вид ID карточек">ID</button>
            <button id="select-mode-btn" class="cabinet-mode-btn" type="button" title="Режим выделения карточек" aria-label="Режим выделения карточек">Выделение</button>
            <button id="send-selected-btn" class="cabinet-send-btn" type="button" title="Отправить выбранные карточки" aria-label="Отправить выбранные карточки" disabled>Отправить</button>
        </div>
    </footer>
    <div id="shuffleModal" class="shuffle-modal" aria-hidden="true">
        <div class="shuffle-modal__overlay" id="shuffleModalOverlay"></div>
        <div class="shuffle-modal__box" role="dialog" aria-modal="true" aria-labelledby="shuffleModalTitle">
            <h3 id="shuffleModalTitle" class="shuffle-modal__title">Случайная выборка карточек</h3>
            <label for="shuffleCountInput" class="shuffle-modal__label">Сколько карточек показать</label>
            <input id="shuffleCountInput" class="shuffle-modal__input" type="number" min="1" step="1" inputmode="numeric" placeholder="Например, 20">
            <div class="shuffle-modal__label">Статусы для выборки</div>
            <div class="shuffle-modal__statuses">
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="UNVIEWED" checked>Не просмотренные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="VIEWED" checked>Просмотренные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="SOLVED" checked>Решенные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="FAVORITE" checked>Избранные</label>
                <label class="shuffle-modal__status-row"><input type="checkbox" name="shuffle-status" value="HARD" checked>Сложные</label>
            </div>
            <p id="shuffleModalMsg" class="shuffle-modal__msg"></p>
            <div class="shuffle-modal__actions">
                <button type="button" id="shuffleModalResetBtn" class="shuffle-modal__btn">Сбросить</button>
                <button type="button" id="shuffleModalCancelBtn" class="shuffle-modal__btn">Отмена</button>
                <button type="button" id="shuffleModalApplyBtn" class="shuffle-modal__btn shuffle-modal__btn--primary">Применить</button>
            </div>
        </div>
    </div>
    {% include "cards_cabinet_assign_modal.html" %}
    <script>
        (function () {
            if (window.Telegram && window.Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
            }
            var initData = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) || '';
            var fabToken = (new URLSearchParams(window.location.search || '')).get('fab_token') || '';
            var errEl = document.getElementById('err');
            var gridEl = document.getElementById('grid');
            var searchInput = document.getElementById('card-search');
            var statusFilter = document.getElementById('status-filter');
            var labelFilterWrap = document.getElementById('label-filter-wrap');
            var labelFilter = document.getElementById('label-filter');
            var adminFabBtn = document.getElementById('admin-fab-btn');
            var selectModeBtn = document.getElementById('select-mode-btn');
            var sendSelectedBtn = document.getElementById('send-selected-btn');
            var shuffleCardsBtn = document.getElementById('shuffle-cards-btn');
            var idToggleBtn = document.getElementById('id-toggle-btn');
            var shuffleModal = document.getElementById('shuffleModal');
            var shuffleModalOverlay = document.getElementById('shuffleModalOverlay');
            var shuffleModalMsg = document.getElementById('shuffleModalMsg');
            var shuffleCountInput = document.getElementById('shuffleCountInput');
            var shuffleModalApplyBtn = document.getElementById('shuffleModalApplyBtn');
            var shuffleModalCancelBtn = document.getElementById('shuffleModalCancelBtn');
            var shuffleModalResetBtn = document.getElementById('shuffleModalResetBtn');
            var assignCardsModal = document.getElementById('assignCardsModal');
            var assignCardsModalOverlay = document.getElementById('assignCardsModalOverlay');
            var assignCardsModalMsg = document.getElementById('assignCardsModalMsg');
            var assignUsersSearchInput = document.getElementById('assignUsersSearchInput');
            var assignUsersTbody = document.getElementById('assignUsersTbody');
            var assignCardsModalCancelBtn = document.getElementById('assignCardsModalCancelBtn');
            var assignCardsModalSubmitBtn = document.getElementById('assignCardsModalSubmitBtn');
            var assignAlreadyHaveModal = document.getElementById('assignAlreadyHaveModal');
            var assignAlreadyHaveModalOverlay = document.getElementById('assignAlreadyHaveModalOverlay');
            var assignAlreadyHaveModalText = document.getElementById('assignAlreadyHaveModalText');
            var assignAlreadyHaveCancelBtn = document.getElementById('assignAlreadyHaveCancelBtn');
            var assignAlreadyHaveContinueBtn = document.getElementById('assignAlreadyHaveContinueBtn');
            var allCards = [];
            var shuffledCards = null;
            var isRootAdminUser = false;
            var isSelectionMode = false;
            var selectedCardIds = {};
            var assignUsers = [];
            var selectedAssignUserId = null;
            var assignUsersLoaded = false;
            var alreadyHaveModalResolver = null;
            var isDbIdMode = false;

            function showErr(msg) {
                errEl.textContent = msg;
                errEl.style.display = 'block';
            }

            function getCardDisplayId(row) {
                if (isDbIdMode) {
                    return Number((row && row.content_card_id) || 0);
                }
                return Number(((row && row.__index) || 0) + 1);
            }

            function updateIdModeUi() {
                if (!idToggleBtn) return;
                idToggleBtn.textContent = isDbIdMode ? 'ID' : 'Номер';
                idToggleBtn.classList.toggle('is-active', isDbIdMode);
                idToggleBtn.title = isDbIdMode
                    ? 'Показаны ID карточек'
                    : 'Показаны относительные номера карточек';
                if (searchInput) {
                    searchInput.placeholder = isDbIdMode
                        ? 'Поиск по ID'
                        : 'Поиск по номеру карточки';
                }
            }

            if (!initData && !fabToken) {
                showErr('Откройте страницу из Telegram или через FAB-мост.');
                return;
            }

            function authPayload(extra) {
                var base = {};
                if (initData) {
                    base.init_data = initData;
                } else if (fabToken) {
                    base.fab_token = fabToken;
                }
                if (extra && typeof extra === 'object') {
                    Object.keys(extra).forEach(function (k) { base[k] = extra[k]; });
                }
                return base;
            }

            function setAssignModalMsg(msg) {
                if (!assignCardsModalMsg) return;
                assignCardsModalMsg.textContent = String(msg || '');
            }

            function selectedCardIdsCount() {
                return Object.keys(selectedCardIds).length;
            }

            function getSelectedCardsInCabinetOrder() {
                if (!Array.isArray(allCards) || !allCards.length) {
                    return [];
                }
                var out = [];
                allCards.forEach(function (row) {
                    var cardIdNum = Number(row && row.content_card_id);
                    if (!Number.isFinite(cardIdNum) || cardIdNum < 1) {
                        return;
                    }
                    if (!selectedCardIds[String(cardIdNum)]) {
                        return;
                    }
                    out.push({
                        id: cardIdNum,
                        number: Number((row && row.__index) || 0) + 1,
                    });
                });
                return out;
            }

            function updateSelectionUi() {
                var selectedCount = getSelectedCardsInCabinetOrder().length;
                if (selectModeBtn) {
                    selectModeBtn.textContent = isSelectionMode ? 'Обычный режим' : 'Выделение';
                    selectModeBtn.classList.toggle('is-active', isSelectionMode);
                }
                if (sendSelectedBtn) {
                    sendSelectedBtn.disabled = !isSelectionMode || selectedCount < 1;
                }
            }

            function clearSelection() {
                selectedCardIds = {};
                updateSelectionUi();
            }

            function setSelectionMode(nextValue) {
                isSelectionMode = !!nextValue;
                if (!isSelectionMode) {
                    clearSelection();
                } else {
                    updateSelectionUi();
                }
                renderCards();
            }

            function closeAssignModal() {
                if (!assignCardsModal) return;
                assignCardsModal.classList.remove('is-open');
                assignCardsModal.setAttribute('aria-hidden', 'true');
                setAssignModalMsg('');
                selectedAssignUserId = null;
            }

            function closeAlreadyHaveModal(confirmed) {
                if (!assignAlreadyHaveModal) return;
                assignAlreadyHaveModal.classList.remove('is-open');
                assignAlreadyHaveModal.setAttribute('aria-hidden', 'true');
                if (alreadyHaveModalResolver) {
                    var resolver = alreadyHaveModalResolver;
                    alreadyHaveModalResolver = null;
                    resolver(!!confirmed);
                }
            }

            function openAlreadyHaveModal(cardItems) {
                return new Promise(function (resolve) {
                    alreadyHaveModalResolver = resolve;
                    if (!assignAlreadyHaveModal || !assignAlreadyHaveModalText) {
                        resolve(false);
                        return;
                    }
                    assignAlreadyHaveModalText.textContent =
                        'У пользователя уже есть карточки: ' + cardItems.join(', ') + '. Продолжить отправку остальных?';
                    assignAlreadyHaveModal.classList.add('is-open');
                    assignAlreadyHaveModal.setAttribute('aria-hidden', 'false');
                });
            }

            function setAssignUsersLoadingState(isLoading) {
                if (!assignCardsModalSubmitBtn) return;
                assignCardsModalSubmitBtn.disabled = !!isLoading;
            }

            function renderAssignUsersTable() {
                if (!assignUsersTbody) return;
                assignUsersTbody.innerHTML = '';
                var filterText = String(assignUsersSearchInput ? assignUsersSearchInput.value : '').trim().toLowerCase();
                var rows = assignUsers.filter(function (row) {
                    if (!filterText) return true;
                    var idText = String(row && row.id || '');
                    var username = String((row && row.username) || '').toLowerCase();
                    var assignedName = String((row && row.assigned_name) || '').toLowerCase();
                    return idText.indexOf(filterText) !== -1 ||
                        username.indexOf(filterText) !== -1 ||
                        assignedName.indexOf(filterText) !== -1;
                });

                if (!rows.length) {
                    var emptyTr = document.createElement('tr');
                    var emptyTd = document.createElement('td');
                    emptyTd.colSpan = 3;
                    emptyTd.textContent = 'Пользователи не найдены.';
                    emptyTr.appendChild(emptyTd);
                    assignUsersTbody.appendChild(emptyTr);
                    return;
                }

                rows.forEach(function (row) {
                    var tr = document.createElement('tr');
                    tr.classList.toggle('is-selected', row.id === selectedAssignUserId);
                    tr.addEventListener('click', function () {
                        selectedAssignUserId = row.id;
                        setAssignModalMsg('');
                        renderAssignUsersTable();
                    });

                    var idTd = document.createElement('td');
                    idTd.textContent = String(row.id);
                    tr.appendChild(idTd);

                    var usernameTd = document.createElement('td');
                    usernameTd.textContent = row.username ? ('@' + row.username) : '—';
                    tr.appendChild(usernameTd);

                    var assignedNameTd = document.createElement('td');
                    assignedNameTd.textContent = row.assigned_name || '—';
                    tr.appendChild(assignedNameTd);

                    assignUsersTbody.appendChild(tr);
                });
            }

            function loadAssignUsers() {
                if (assignUsersLoaded) {
                    renderAssignUsersTable();
                    return Promise.resolve();
                }
                setAssignUsersLoadingState(true);
                return fetch('/api/content_cards/admin_users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(authPayload()),
                })
                    .then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (j) {
                                throw new Error(j.detail || r.statusText);
                            }).catch(function () {
                                throw new Error('Не удалось загрузить пользователей');
                            });
                        }
                        return r.json();
                    })
                    .then(function (data) {
                        assignUsers = Array.isArray(data && data.users) ? data.users : [];
                        assignUsersLoaded = true;
                        renderAssignUsersTable();
                    })
                    .finally(function () {
                        setAssignUsersLoadingState(false);
                    });
            }

            function openAssignModal() {
                if (!assignCardsModal) return;
                if (!isRootAdminUser) return;
                if (!isSelectionMode || getSelectedCardsInCabinetOrder().length < 1) return;
                if (assignUsersSearchInput) {
                    assignUsersSearchInput.value = '';
                }
                selectedAssignUserId = null;
                setAssignModalMsg('');
                assignCardsModal.classList.add('is-open');
                assignCardsModal.setAttribute('aria-hidden', 'false');
                loadAssignUsers().catch(function (e) {
                    setAssignModalMsg(e && e.message ? e.message : 'Ошибка загрузки списка пользователей');
                });
            }

            function submitSelectedCardsToUser() {
                if (!selectedAssignUserId) {
                    setAssignModalMsg('Выберите пользователя.');
                    return;
                }
                var selectedCards = getSelectedCardsInCabinetOrder();
                var selectedIds = selectedCards.map(function (row) { return row.id; });
                var numberByCardId = {};
                selectedCards.forEach(function (row) {
                    numberByCardId[String(row.id)] = row.number;
                });
                if (!selectedCards.length) {
                    setAssignModalMsg('Выберите хотя бы одну карточку.');
                    return;
                }

                function sendAssignRequest() {
                    return fetch('/api/content_cards/assign_to_user', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(
                            authPayload({
                                target_user_id: selectedAssignUserId,
                                content_card_ids: selectedIds,
                            })
                        ),
                    });
                }

                setAssignUsersLoadingState(true);
                fetch('/api/content_cards/assign_preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(
                        authPayload({
                            target_user_id: selectedAssignUserId,
                            content_card_ids: selectedIds,
                        })
                    ),
                })
                    .then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (j) {
                                throw new Error(j.detail || r.statusText);
                            }).catch(function () {
                                throw new Error('Ошибка проверки карточек');
                            });
                        }
                        return r.json();
                    })
                    .then(function (previewData) {
                        var alreadyHadIds = Array.isArray(previewData && previewData.already_had_ids)
                            ? previewData.already_had_ids
                            : [];
                        if (alreadyHadIds.length) {
                            var numberWithIdItems = alreadyHadIds
                                .map(function (cardId) {
                                    var n = numberByCardId[String(cardId)];
                                    if (!Number.isFinite(n)) {
                                        return null;
                                    }
                                    return {
                                        number: n,
                                        id: Number(cardId),
                                    };
                                })
                                .filter(function (row) { return !!row; })
                                .sort(function (a, b) { return a.number - b.number; })
                                .map(function (row) {
                                    return '№' + row.number + ' (id: ' + row.id + ')';
                                });
                            if (!numberWithIdItems.length) {
                                numberWithIdItems = alreadyHadIds.map(function (cardId) {
                                    return 'id: ' + cardId;
                                });
                            }
                            return openAlreadyHaveModal(numberWithIdItems).then(function (confirmed) {
                                if (!confirmed) {
                                    throw new Error('__PREVIEW_CANCELLED__');
                                }
                                return sendAssignRequest();
                            });
                        }
                        return sendAssignRequest();
                    })
                    .then(function (r) {
                        if (!r.ok) {
                            return r.json().then(function (j) {
                                throw new Error(j.detail || r.statusText);
                            }).catch(function () {
                                throw new Error('Ошибка отправки карточек');
                            });
                        }
                        return r.json();
                    })
                    .then(function (data) {
                        var issuedCount = Number((data && data.issued_count) || 0);
                        var alreadyHadCount = Number((data && data.already_had_count) || 0);
                        var invalidCount = Number((data && data.invalid_count) || 0);
                        var pieces = ['Выдано: ' + issuedCount + '.'];
                        if (alreadyHadCount > 0) {
                            pieces.push('Уже были у пользователя: ' + alreadyHadCount + '.');
                        }
                        if (invalidCount > 0) {
                            pieces.push('Не найдены: ' + invalidCount + '.');
                        }
                        if (data && data.notify_sent === false && data.notify_error) {
                            pieces.push('Уведомление не отправлено: ' + data.notify_error + '.');
                        }
                        window.alert(pieces.join(' '));
                        closeAssignModal();
                        setSelectionMode(false);
                    })
                    .catch(function (e) {
                        if (e && e.message === '__PREVIEW_CANCELLED__') {
                            return;
                        }
                        setAssignModalMsg(e && e.message ? e.message : 'Ошибка отправки карточек');
                    })
                    .finally(function () {
                        setAssignUsersLoadingState(false);
                    });
            }

            if (searchInput) {
                searchInput.addEventListener('input', function () {
                    var digitsOnly = this.value.replace(/\D+/g, '');
                    if (this.value !== digitsOnly) {
                        this.value = digitsOnly;
                    }
                    renderCards();
                });
            }
            if (statusFilter) {
                statusFilter.addEventListener('change', renderCards);
            }
            if (labelFilter) {
                labelFilter.addEventListener('change', renderCards);
            }

            function renderCards() {
                gridEl.innerHTML = '';
                var filter = searchInput ? String(searchInput.value || '') : '';
                var statusFilterValue = statusFilter ? String(statusFilter.value || '').toUpperCase() : '';
                var labelFilterValue = labelFilter ? String(labelFilter.value || '') : '';
                var sourceCards = shuffledCards && shuffledCards.length ? shuffledCards : allCards;
                var cards = sourceCards.filter(function (row) {
                    var cardNumber = String(getCardDisplayId(row));
                    var status = String((row && row.status) || 'UNVIEWED').toUpperCase();
                    var labels = Array.isArray(row && row.labels) ? row.labels : [];
                    var passNumber = !filter || cardNumber.indexOf(filter) !== -1;
                    var passStatus = !statusFilterValue || status === statusFilterValue;
                    var passLabel = !labelFilterValue || labels.indexOf(labelFilterValue) !== -1;
                    return passNumber && passStatus && passLabel;
                });

                if (!cards.length) {
                    gridEl.innerHTML = '<p class="empty">Карточки по вашему запросу не найдены.</p>';
                    return;
                }

                cards.forEach(function (row) {
                    var id = row.content_card_id;
                    var index = row.__index;
                    var status = String((row && row.status) || 'UNVIEWED').toUpperCase();
                    var cardIdNum = Number(id);
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'tile';
                    if (status === 'VIEWED') {
                        btn.classList.add('tile--viewed');
                    } else if (status === 'SOLVED') {
                        btn.classList.add('tile--solved');
                    } else if (status === 'FAVORITE') {
                        btn.classList.add('tile--favorite');
                    } else if (status === 'HARD') {
                        btn.classList.add('tile--hard');
                    }
                    if (isSelectionMode && selectedCardIds[String(cardIdNum)]) {
                        btn.classList.add('tile--selected');
                    }
                    var displayId = getCardDisplayId(row);
                    btn.textContent = String(displayId);
                    btn.title = 'Карточка #' + id;
                    btn.addEventListener('click', function () {
                        if (isSelectionMode) {
                            var selectedKey = String(cardIdNum);
                            if (selectedCardIds[selectedKey]) {
                                delete selectedCardIds[selectedKey];
                            } else {
                                selectedCardIds[selectedKey] = true;
                            }
                            updateSelectionUi();
                            renderCards();
                            return;
                        }
                        var cardNumber = index + 1;
                        var openCard = function () {
                            var path =
                                '/content-card-view?content_card_id=' + encodeURIComponent(id) +
                                '&card_number=' + encodeURIComponent(cardNumber) +
                                (fabToken ? '&fab_token=' + encodeURIComponent(fabToken) : '');
                            window.location.assign(path);
                        };
                        if (status !== 'UNVIEWED') {
                            openCard();
                            return;
                        }
                        fetch('/api/content_cards/mark_viewed', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(
                                    authPayload({ content_card_id: Number(id) })
                                ),
                        }).catch(function () {
                            // Даже если отметка статуса не удалась, всё равно открываем карточку.
                        }).finally(openCard);
                    });
                    gridEl.appendChild(btn);
                });
            }

            function setShuffleModalMsg(msg) {
                if (!shuffleModalMsg) return;
                shuffleModalMsg.textContent = String(msg || '');
            }

            function closeShuffleModal() {
                if (!shuffleModal) return;
                shuffleModal.classList.remove('is-open');
                shuffleModal.setAttribute('aria-hidden', 'true');
                setShuffleModalMsg('');
            }

            function openShuffleModal() {
                if (!shuffleModal) return;
                if (shuffleCountInput) {
                    shuffleCountInput.value = String(Math.min(allCards.length || 1, 20));
                }
                setShuffleModalMsg('');
                shuffleModal.classList.add('is-open');
                shuffleModal.setAttribute('aria-hidden', 'false');
            }

            function collectSelectedShuffleStatuses() {
                if (!shuffleModal) return [];
                var checks = shuffleModal.querySelectorAll('input[name="shuffle-status"]:checked');
                var out = [];
                checks.forEach(function (el) {
                    var v = String((el && el.value) || '').toUpperCase();
                    if (v) out.push(v);
                });
                return out;
            }

            function applyShuffleSelection() {
                if (!allCards || !allCards.length) {
                    setShuffleModalMsg('Нет карточек для выборки.');
                    return;
                }
                var count = parseInt(shuffleCountInput ? shuffleCountInput.value : '', 10);
                if (!Number.isFinite(count) || count <= 0) {
                    setShuffleModalMsg('Введите корректное количество (> 0).');
                    return;
                }
                var selectedStatuses = collectSelectedShuffleStatuses();
                if (!selectedStatuses.length) {
                    setShuffleModalMsg('Выберите хотя бы один статус.');
                    return;
                }

                var candidates = allCards.filter(function (row) {
                    var status = String((row && row.status) || 'UNVIEWED').toUpperCase();
                    return selectedStatuses.indexOf(status) !== -1;
                });
                if (!candidates.length) {
                    setShuffleModalMsg('По выбранным статусам карточек нет.');
                    return;
                }

                var pool = candidates.slice();
                for (var i = pool.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var tmp = pool[i];
                    pool[i] = pool[j];
                    pool[j] = tmp;
                }
                var limit = Math.min(count, pool.length);
                shuffledCards = pool.slice(0, limit);
                closeShuffleModal();
                renderCards();
            }

            if (shuffleCardsBtn) {
                shuffleCardsBtn.addEventListener('click', function () {
                    openShuffleModal();
                });
            }
            if (idToggleBtn) {
                idToggleBtn.addEventListener('click', function () {
                    isDbIdMode = !isDbIdMode;
                    updateIdModeUi();
                    renderCards();
                });
                updateIdModeUi();
            }
            if (shuffleModalOverlay) {
                shuffleModalOverlay.addEventListener('click', closeShuffleModal);
            }
            if (shuffleModalCancelBtn) {
                shuffleModalCancelBtn.addEventListener('click', closeShuffleModal);
            }
            if (shuffleModalApplyBtn) {
                shuffleModalApplyBtn.addEventListener('click', applyShuffleSelection);
            }
            if (shuffleModalResetBtn) {
                shuffleModalResetBtn.addEventListener('click', function () {
                    shuffledCards = null;
                    closeShuffleModal();
                    renderCards();
                });
            }
            if (selectModeBtn) {
                selectModeBtn.addEventListener('click', function () {
                    setSelectionMode(!isSelectionMode);
                });
            }
            if (sendSelectedBtn) {
                sendSelectedBtn.addEventListener('click', openAssignModal);
            }
            if (assignUsersSearchInput) {
                assignUsersSearchInput.addEventListener('input', renderAssignUsersTable);
            }
            if (assignCardsModalOverlay) {
                assignCardsModalOverlay.addEventListener('click', closeAssignModal);
            }
            if (assignCardsModalCancelBtn) {
                assignCardsModalCancelBtn.addEventListener('click', closeAssignModal);
            }
            if (assignCardsModalSubmitBtn) {
                assignCardsModalSubmitBtn.addEventListener('click', submitSelectedCardsToUser);
            }
            if (assignAlreadyHaveModalOverlay) {
                assignAlreadyHaveModalOverlay.addEventListener('click', function () {
                    closeAlreadyHaveModal(false);
                });
            }
            if (assignAlreadyHaveCancelBtn) {
                assignAlreadyHaveCancelBtn.addEventListener('click', function () {
                    closeAlreadyHaveModal(false);
                });
            }
            if (assignAlreadyHaveContinueBtn) {
                assignAlreadyHaveContinueBtn.addEventListener('click', function () {
                    closeAlreadyHaveModal(true);
                });
            }
            updateSelectionUi();

            fetch('/api/content_cards/my_list', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(authPayload()),
            })
                .then(function (r) {
                    if (!r.ok) {
                        return r.json().then(function (j) {
                            throw new Error(j.detail || r.statusText);
                        }).catch(function () {
                            throw new Error('Ошибка загрузки списка');
                        });
                    }
                    return r.json();
                })
                .then(function (data) {
                    isRootAdminUser = !!(data && data.is_root_admin);
                    if (isRootAdminUser && adminFabBtn) {
                        adminFabBtn.classList.add('is-visible');
                    }
                    if (isRootAdminUser && selectModeBtn) {
                        selectModeBtn.classList.add('is-visible');
                    }
                    if (isRootAdminUser && sendSelectedBtn) {
                        sendSelectedBtn.classList.add('is-visible');
                    }
                    var cards = (data && data.cards) || [];
                    if (!cards.length) {
                        gridEl.innerHTML = '<p class="empty">У вас пока нет доступных карточек.</p>';
                        return;
                    }
                    allCards = cards.map(function (row, index) {
                        return Object.assign({}, row, { __index: index });
                    });
                    renderCards();
                })
                .catch(function (e) {
                    showErr(e.message || String(e));
                });

            fetch('/api/content_cards/all_labels', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(authPayload()),
            })
                .then(function (r) {
                    if (!r.ok) {
                        throw new Error('Нет доступа к фильтру меток');
                    }
                    return r.json();
                })
                .then(function (data) {
                    var labels = (data && data.labels) || [];
                    if (!labels.length || !labelFilter || !labelFilterWrap) {
                        return;
                    }
                    labels.forEach(function (label) {
                        var opt = document.createElement('option');
                        opt.value = label;
                        opt.textContent = label;
                        labelFilter.appendChild(opt);
                    });
                    labelFilterWrap.classList.add('is-visible');
                })
                .catch(function () {
                    // Для не-админов фильтр меток просто скрыт.
                });
        })();
    </script>
</body>

</html>
