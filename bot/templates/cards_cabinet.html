<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои карточки</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
            color: #e8e8e8;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }

        .wrap {
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 12px;
            text-align: center;
        }

        .hint {
            font-size: 0.85rem;
            color: #9a9a9a;
            margin-bottom: 16px;
        }
        .search-wrap {
            margin-bottom: 14px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 10px;
        }
        .search-input {
            width: 70%;
            background: #232323;
            color: #f0f0f0;
            border: 1px solid #3c3c3c;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.95rem;
            outline: none;
        }
        .search-input:focus {
            border-color: #5f8fbd;
        }
        .status-filter-wrap {
            width: 30%;
            display: flex;
            justify-content: flex-end;
        }
        .status-filter-select {
            width: min(100%, 140px);
            background: #2b2b2b;
            color: #f0f0f0;
            border: 1px solid #454545;
            border-radius: 10px;
            padding: 10px 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }
        .status-filter-select:focus {
            border-color: #5f8fbd;
        }

        .err {
            color: #ff8a80;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
            gap: 10px;
        }

        .tile {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 10px;
            font-size: 1.35rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s, border-color 0.15s;
        }

        .tile:active {
            background: #3d5a80;
            border-color: #5a7aaa;
        }
        .tile--viewed {
            background: #3e6f9f;
            border-color: #5f8fbd;
        }
        .tile--solved {
            background: #2f8f4f;
            border-color: #58ba7a;
        }
        .tile--favorite {
            background: #b7902a;
            border-color: #dbb54f;
        }
        .tile--hard {
            background: #a43b3b;
            border-color: #cb6363;
        }

        .empty {
            color: #888;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>Мои карточки</h1>
        <div class="search-wrap">
            <input
                id="card-search"
                class="search-input"
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="Поиск по номеру карточки"
                autocomplete="off"
            >
            <div class="status-filter-wrap">
                <select id="status-filter" class="status-filter-select" title="Фильтр по статусу">
                    <option value="">Все статусы</option>
                    <option value="UNVIEWED">Не просмотренные</option>
                    <option value="VIEWED">Просмотренные</option>
                    <option value="SOLVED">Решенные</option>
                    <option value="FAVORITE">Избранные</option>
                    <option value="HARD">Сложные</option>
                </select>
            </div>
        </div>
        <div id="err" class="err" style="display:none;"></div>
        <div id="grid" class="grid"></div>
    </div>
    <script>
        (function () {
            if (window.Telegram && window.Telegram.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand();
            }
            var initData = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) || '';
            var errEl = document.getElementById('err');
            var gridEl = document.getElementById('grid');
            var searchInput = document.getElementById('card-search');
            var statusFilter = document.getElementById('status-filter');
            var allCards = [];

            function showErr(msg) {
                errEl.textContent = msg;
                errEl.style.display = 'block';
            }

            if (!initData) {
                showErr('Откройте страницу из Telegram.');
                return;
            }

            if (searchInput) {
                searchInput.addEventListener('input', function () {
                    var digitsOnly = this.value.replace(/\D+/g, '');
                    if (this.value !== digitsOnly) {
                        this.value = digitsOnly;
                    }
                    renderCards();
                });
            }
            if (statusFilter) {
                statusFilter.addEventListener('change', renderCards);
            }

            function renderCards() {
                gridEl.innerHTML = '';
                var filter = searchInput ? String(searchInput.value || '') : '';
                var statusFilterValue = statusFilter ? String(statusFilter.value || '').toUpperCase() : '';
                var cards = allCards.filter(function (row, index) {
                    var cardNumber = String(index + 1);
                    var status = String((row && row.status) || 'UNVIEWED').toUpperCase();
                    var passNumber = !filter || cardNumber.indexOf(filter) !== -1;
                    var passStatus = !statusFilterValue || status === statusFilterValue;
                    return passNumber && passStatus;
                });

                if (!cards.length) {
                    gridEl.innerHTML = '<p class="empty">Карточки по вашему запросу не найдены.</p>';
                    return;
                }

                cards.forEach(function (row) {
                    var id = row.content_card_id;
                    var index = row.__index;
                    var status = String((row && row.status) || 'UNVIEWED').toUpperCase();
                    var btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'tile';
                    if (status === 'VIEWED') {
                        btn.classList.add('tile--viewed');
                    } else if (status === 'SOLVED') {
                        btn.classList.add('tile--solved');
                    } else if (status === 'FAVORITE') {
                        btn.classList.add('tile--favorite');
                    } else if (status === 'HARD') {
                        btn.classList.add('tile--hard');
                    }
                    btn.textContent = String(index + 1);
                    btn.title = 'Карточка #' + id;
                    btn.addEventListener('click', function () {
                        var cardNumber = index + 1;
                        var openCard = function () {
                            var path =
                                '/content-card-view?content_card_id=' + encodeURIComponent(id) +
                                '&card_number=' + encodeURIComponent(cardNumber);
                            window.location.assign(path);
                        };
                        if (status !== 'UNVIEWED') {
                            openCard();
                            return;
                        }
                        fetch('/api/content_cards/mark_viewed', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                init_data: initData,
                                content_card_id: Number(id),
                            }),
                        }).catch(function () {
                            // Даже если отметка статуса не удалась, всё равно открываем карточку.
                        }).finally(openCard);
                    });
                    gridEl.appendChild(btn);
                });
            }

            fetch('/api/content_cards/my_list', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ init_data: initData }),
            })
                .then(function (r) {
                    if (!r.ok) {
                        return r.json().then(function (j) {
                            throw new Error(j.detail || r.statusText);
                        }).catch(function () {
                            throw new Error('Ошибка загрузки списка');
                        });
                    }
                    return r.json();
                })
                .then(function (data) {
                    var cards = (data && data.cards) || [];
                    if (!cards.length) {
                        gridEl.innerHTML = '<p class="empty">У вас пока нет доступных карточек.</p>';
                        return;
                    }
                    allCards = cards.map(function (row, index) {
                        return Object.assign({}, row, { __index: index });
                    });
                    renderCards();
                })
                .catch(function (e) {
                    showErr(e.message || String(e));
                });
        })();
    </script>
</body>

</html>
