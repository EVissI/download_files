<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сохранённая карточка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/content_editor.css?t={{ cache_timestamp }}">
    <style>
        html {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
        }
        body {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }
        .cards-cabinet-topbar {
            display: flex;
            align-items: center;
            min-height: 52px;
            padding: max(8px, env(safe-area-inset-top, 0px)) 12px 8px;
            background: #252525;
            border-bottom: 1px solid #3a3a3a;
        }
        .cards-cabinet-back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #2f2f2f;
            color: #fff;
            text-decoration: none;
            border: 1px solid #4b4b4b;
            font-size: 18px;
        }
        .cards-cabinet-back-link:active {
            background: #3b3b3b;
        }
    </style>
    <script>
        window.__CONTENT_CARD_VIEW_ONLY__ = true;
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/js/content_editor.js?t={{ cache_timestamp }}"></script>
</head>

<body>
    <div class="cards-cabinet-topbar" role="navigation">
        <a
            class="cards-cabinet-back-link"
            href="/cards-cabinet"
            aria-label="Назад в кабинет карточек"
            title="Назад в кабинет"
        >
            <i class="fa fa-chevron-left" aria-hidden="true"></i>
        </a>
    </div>
    <!-- Кнопки админа (добавление/удаление кадра и т.д.) — content_editor.js (initContentCardViewOnly + _ensureContentCardAddFrameUi). -->
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
    </script>
</body>

</html>
