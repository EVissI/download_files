<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сохранённая карточка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/content_editor.css?t={{ cache_timestamp }}">
    <style>
        html {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a1a1a;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            padding-top: 5px;
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }
        #contentCardViewRoot {
            height: calc(100vh - 5px);
        }
        #contentCardViewRoot .card-preview-box {
            width: 100%;
            max-width: none;
            min-height: 100%;
            margin: 0;
            border: none;
            border-radius: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #contentCardViewRoot .card-preview-header {
            display: none;
        }
        #contentCardViewRoot .card-preview-meta {
            margin: 0;
            padding: 6px 12px;
        }
        #contentCardViewRoot .card-preview-frame-host {
            flex: 1 1 auto;
            min-height: 0;
            margin: 0;
            border-radius: 0;
        }
        #contentCardViewRoot .card-preview-nav {
            margin: 0;
            padding: 8px 12px max(8px, env(safe-area-inset-bottom));
            border-top: 1px solid #404040;
            border-bottom: 0;
            background: #22272e;
            flex-shrink: 0;
            gap: 8px 10px;
        }
        #contentCardViewRoot .card-preview-nav .card-preview-counter {
            display: none;
        }
        #contentCardViewRoot .card-preview-admin-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .content-card-view-back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #2f3238;
            color: #fff;
            text-decoration: none;
            border: 1px solid #484c55;
            font-size: 18px;
            flex-shrink: 0;
            margin-right: 8px;
        }
        .content-card-view-back-btn:active {
            background: #3a3f47;
        }
        .content-card-view-status-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #2f3238;
            color: #fff;
            text-decoration: none;
            border: 1px solid #484c55;
            font-size: 16px;
            flex-shrink: 0;
            cursor: pointer;
            margin-left: 8px;
        }
        .content-card-view-status-btn:active {
            background: #3a3f47;
        }
        .content-card-view-card-number {
            display: inline-flex;
            align-items: center;
            color: #e3e8ef;
            font-size: 14px;
            font-weight: 600;
            margin: 0 2px 0 0;
            white-space: nowrap;
        }
        .content-card-status-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200000;
        }
        .content-card-status-modal.is-open {
            display: flex;
        }
        .content-card-status-modal__overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
        }
        .content-card-status-modal__box {
            position: relative;
            width: min(92vw, 360px);
            background: #262a30;
            border: 1px solid #3f4550;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
        }
        .content-card-status-modal__title {
            margin: 0 0 10px;
            font-size: 16px;
            font-weight: 600;
        }
        .content-card-status-modal__select {
            width: 100%;
            background: #1f2329;
            color: #fff;
            border: 1px solid #3f4550;
            border-radius: 8px;
            padding: 9px 10px;
            margin-bottom: 10px;
        }
        .content-card-status-modal__msg {
            min-height: 18px;
            margin: 0 0 10px;
            font-size: 13px;
            color: #f4b567;
        }
        .content-card-status-modal__actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .content-card-status-modal__btn {
            border: 1px solid #4a505b;
            background: #353b45;
            color: #fff;
            border-radius: 8px;
            padding: 7px 12px;
            cursor: pointer;
        }
        .content-card-status-modal__btn--primary {
            border-color: #5f8fbd;
            background: #3e6f9f;
        }
    </style>
    <script>
        window.__CONTENT_CARD_VIEW_ONLY__ = true;
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/static/js/content-editor/bootstrap/index.js?t={{ cache_timestamp }}"></script>
</head>

<body>
    <!-- Кнопки админа (добавление/удаление кадра и т.д.) — content_editor.js (initContentCardViewOnly + _ensureContentCardAddFrameUi). -->
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        (function () {
            var statusMap = [
                { value: 'SOLVED', label: 'Решенная' },
                { value: 'FAVORITE', label: 'Избранная' },
                { value: 'HARD', label: 'Сложная' },
            ];

            function getCardId() {
                var params = new URLSearchParams(window.location.search || '');
                var cardId = Number(params.get('content_card_id') || 0);
                return Number.isFinite(cardId) && cardId > 0 ? cardId : 0;
            }
            function getFabToken() {
                var params = new URLSearchParams(window.location.search || '');
                return String(params.get('fab_token') || '');
            }

            function getCardNumber() {
                var params = new URLSearchParams(window.location.search || '');
                var cardNumber = Number(params.get('card_number') || 0);
                return Number.isFinite(cardNumber) && cardNumber > 0 ? cardNumber : 0;
            }

            function getInitData() {
                return (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) || '';
            }
            function authPayload(extra) {
                var initData = getInitData();
                var fabToken = getFabToken();
                var base = {};
                if (initData) {
                    base.init_data = initData;
                } else if (fabToken) {
                    base.fab_token = fabToken;
                }
                if (extra && typeof extra === 'object') {
                    Object.keys(extra).forEach(function (k) { base[k] = extra[k]; });
                }
                return base;
            }

            function ensureStatusModal() {
                var modal = document.getElementById('contentCardStatusModal');
                if (modal) return modal;
                document.body.insertAdjacentHTML(
                    'beforeend',
                    '<div id="contentCardStatusModal" class="content-card-status-modal" aria-hidden="true">' +
                        '<div class="content-card-status-modal__overlay"></div>' +
                        '<div class="content-card-status-modal__box" role="dialog" aria-modal="true">' +
                            '<h3 class="content-card-status-modal__title">Статус карточки</h3>' +
                            '<select id="contentCardStatusSelect" class="content-card-status-modal__select"></select>' +
                            '<p id="contentCardStatusMsg" class="content-card-status-modal__msg"></p>' +
                            '<div class="content-card-status-modal__actions">' +
                                '<button type="button" id="contentCardStatusCancel" class="content-card-status-modal__btn">Отмена</button>' +
                                '<button type="button" id="contentCardStatusSave" class="content-card-status-modal__btn content-card-status-modal__btn--primary">Сохранить</button>' +
                            '</div>' +
                        '</div>' +
                    '</div>'
                );
                modal = document.getElementById('contentCardStatusModal');
                var select = document.getElementById('contentCardStatusSelect');
                if (select) {
                    select.innerHTML = '';
                    statusMap.forEach(function (row) {
                        var opt = document.createElement('option');
                        opt.value = row.value;
                        opt.textContent = row.label;
                        select.appendChild(opt);
                    });
                }
                var closeModal = function () {
                    modal.classList.remove('is-open');
                    modal.setAttribute('aria-hidden', 'true');
                };
                var overlay = modal.querySelector('.content-card-status-modal__overlay');
                if (overlay) overlay.addEventListener('click', closeModal);
                document.getElementById('contentCardStatusCancel').addEventListener('click', closeModal);
                document.getElementById('contentCardStatusSave').addEventListener('click', saveStatus);
                return modal;
            }

            function setStatusMessage(text) {
                var msg = document.getElementById('contentCardStatusMsg');
                if (msg) msg.textContent = text || '';
            }

            function openStatusModal() {
                var cardId = getCardId();
                var initData = getInitData();
                var fabToken = getFabToken();
                var modal = ensureStatusModal();
                var select = document.getElementById('contentCardStatusSelect');
                if (!cardId || (!initData && !fabToken) || !select) return;
                setStatusMessage('');
                select.value = 'SOLVED';

                fetch('/api/content_cards/fetch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(authPayload({ content_card_id: cardId })),
                }).then(function (r) {
                    if (!r.ok) throw new Error('Не удалось получить текущий статус');
                    return r.json();
                }).then(function (data) {
                    var st = String((data && data.user_card_status) || 'UNVIEWED').toUpperCase();
                    if (statusMap.some(function (x) { return x.value === st; })) {
                        select.value = st;
                    }
                }).catch(function () {
                    setStatusMessage('Не удалось загрузить текущий статус.');
                }).finally(function () {
                    modal.classList.add('is-open');
                    modal.setAttribute('aria-hidden', 'false');
                });
            }

            function saveStatus() {
                var cardId = getCardId();
                var initData = getInitData();
                var fabToken = getFabToken();
                var modal = document.getElementById('contentCardStatusModal');
                var select = document.getElementById('contentCardStatusSelect');
                if (!cardId || (!initData && !fabToken) || !select) return;
                setStatusMessage('');

                fetch('/api/content_cards/set_status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(
                        authPayload({
                            content_card_id: cardId,
                            status: String(select.value || 'SOLVED'),
                        })
                    ),
                }).then(function (r) {
                    if (!r.ok) {
                        return r.json().then(function (j) {
                            throw new Error((j && j.detail) || 'Ошибка сохранения статуса');
                        }).catch(function () {
                            throw new Error('Ошибка сохранения статуса');
                        });
                    }
                    return r.json();
                }).then(function () {
                    if (modal) {
                        modal.classList.remove('is-open');
                        modal.setAttribute('aria-hidden', 'true');
                    }
                }).catch(function (e) {
                    setStatusMessage(e.message || String(e));
                });
            }

            function ensureNavButtons() {
                var nav = document.querySelector('#contentCardViewRoot .card-preview-nav');
                if (!nav) return;
                if (!nav.querySelector('.content-card-view-back-btn')) {
                    var backLink = document.createElement('a');
                    backLink.className = 'content-card-view-back-btn';
                    backLink.href = '/cards-cabinet';
                    backLink.setAttribute('aria-label', 'Назад в кабинет карточек');
                    backLink.setAttribute('title', 'Назад в кабинет');
                    backLink.innerHTML = '<i class="fa fa-mail-reply" aria-hidden="true"></i>';
                    backLink.addEventListener('click', function (e) {
                        e.preventDefault();
                        var fabToken = getFabToken();
                        var url = '/cards-cabinet' + (fabToken ? ('?fab_token=' + encodeURIComponent(fabToken)) : '');
                        window.location.assign(url);
                    });
                    nav.insertBefore(backLink, nav.firstChild);
                }

                if (!nav.querySelector('.content-card-view-status-btn')) {
                    var statusBtn = document.createElement('button');
                    statusBtn.type = 'button';
                    statusBtn.className = 'content-card-view-status-btn';
                    statusBtn.setAttribute('aria-label', 'Изменить статус карточки');
                    statusBtn.setAttribute('title', 'Изменить статус');
                    statusBtn.innerHTML = '<i class="fa fa-bookmark" aria-hidden="true"></i>';
                    statusBtn.addEventListener('click', openStatusModal);
                    nav.appendChild(statusBtn);
                }
            }

            function ensureNavInFooterAndAdminButtons() {
                var root = document.getElementById('contentCardViewRoot');
                if (!root) return;
                var box = root.querySelector('.card-preview-box');
                var nav = root.querySelector('.card-preview-nav');
                if (!box || !nav) return;

                if (box.lastElementChild !== nav) {
                    box.appendChild(nav);
                }

                var adminHost = nav.querySelector('.card-preview-admin-actions');
                if (!adminHost) {
                    adminHost = document.createElement('div');
                    adminHost.className = 'card-preview-admin-actions';
                    nav.appendChild(adminHost);
                }

                var adminButtons = root.querySelectorAll(
                    '.content-card-view-info-btn, .content-card-view-edit-btn, .content-card-view-add-frame-btn, .content-card-view-delete-frame-btn'
                );
                adminButtons.forEach(function (btn) {
                    if (btn && btn.parentElement !== adminHost) {
                        adminHost.appendChild(btn);
                    }
                });
            }

            function ensureCardNumberNearBackButton() {
                var cardNumber = getCardNumber();
                if (!cardNumber) return;
                var nav = document.querySelector('#contentCardViewRoot .card-preview-nav');
                if (!nav) return;
                var backBtn = nav.querySelector('.content-card-view-back-btn');
                if (!backBtn) return;

                var existing = nav.querySelector('.content-card-view-card-number');
                if (!existing) {
                    existing = document.createElement('span');
                    existing.className = 'content-card-view-card-number';
                }
                existing.textContent = '№ ' + cardNumber;
                if (existing.nextSibling !== backBtn) {
                    nav.insertBefore(existing, backBtn);
                }
            }

            function normalizeCardNumberLabels() {
                var root = document.getElementById('contentCardViewRoot');
                if (!root) return;
                var nodes = root.querySelectorAll('.card-preview-counter, .content-card-view-card-number');
                nodes.forEach(function (node) {
                    var raw = String(node.textContent || '');
                    if (!raw) return;
                    node.textContent = raw
                        .replace(/карточка\s*№?\s*/ig, '№ ')
                        .replace(/\s{2,}/g, ' ')
                        .trim();
                });
            }

            var attempts = 0;
            var maxAttempts = 40;
            var timer = setInterval(function () {
                ensureNavButtons();
                ensureNavInFooterAndAdminButtons();
                ensureCardNumberNearBackButton();
                normalizeCardNumberLabels();
                attempts += 1;
                if (attempts >= maxAttempts) {
                    clearInterval(timer);
                }
            }, 250);
            ensureNavButtons();
            ensureNavInFooterAndAdminButtons();
            ensureCardNumberNearBackButton();
            normalizeCardNumberLabels();
        })();
    </script>
</body>

</html>
