<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сохранённая карточка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/content_editor.css?t={{ cache_timestamp }}">
    <style>
        html {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
        }
        body {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
            padding-top: 48px;
            box-sizing: border-box;
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }
        .cards-cabinet-back {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 8px 12px;
            padding-top: max(8px, env(safe-area-inset-top, 0px));
            background: #252525;
            border-bottom: 1px solid #3a3a3a;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .cards-cabinet-back a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            border-radius: 8px;
            background: #3d5a80;
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            border: 1px solid #5a7aaa;
        }
        .cards-cabinet-back a:active {
            opacity: 0.9;
        }
    </style>
    <script>
        window.__CONTENT_CARD_VIEW_ONLY__ = true;
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/js/content_editor.js?t={{ cache_timestamp }}"></script>
</head>

<body>
    <div class="cards-cabinet-back" role="navigation">
        <a href="/cards-cabinet">← Мои карточки</a>
    </div>
    <!-- Кнопки админа (добавление/удаление кадра и т.д.) — content_editor.js (initContentCardViewOnly + _ensureContentCardAddFrameUi). -->
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }
    </script>
</body>

</html>
