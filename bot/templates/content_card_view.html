<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сохранённая карточка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/content_editor.css?t={{ cache_timestamp }}">
    <style>
        html {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
        }
        body {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }
        .content-card-view-back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #3d5a80;
            color: #fff;
            text-decoration: none;
            border: 1px solid #5a7aaa;
            font-size: 18px;
            margin-right: auto;
        }
        .content-card-view-back-btn:active {
            opacity: 0.9;
        }
    </style>
    <script>
        window.__CONTENT_CARD_VIEW_ONLY__ = true;
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/js/content_editor.js?t={{ cache_timestamp }}"></script>
</head>

<body>
    <!-- Кнопки админа (добавление/удаление кадра и т.д.) — content_editor.js (initContentCardViewOnly + _ensureContentCardAddFrameUi). -->
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        (function () {
            function ensureBackButton() {
                var header = document.querySelector('#contentCardViewRoot .card-preview-header');
                if (!header) return;
                if (header.querySelector('.content-card-view-back-btn')) return;

                var link = document.createElement('a');
                link.className = 'content-card-view-back-btn';
                link.href = '/cards-cabinet';
                link.setAttribute('aria-label', 'Назад в кабинет карточек');
                link.setAttribute('title', 'Назад в кабинет');
                link.innerHTML = '<i class="fa fa-chevron-left" aria-hidden="true"></i>';
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    window.location.assign('/cards-cabinet');
                });

                header.insertBefore(link, header.firstChild);
            }

            ensureBackButton();
            var observer = new MutationObserver(function () {
                ensureBackButton();
            });
            observer.observe(document.body, { childList: true, subtree: true });
        })();
    </script>
</body>

</html>
