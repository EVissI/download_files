<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сохранённая карточка</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/css/content_editor.css?t={{ cache_timestamp }}">
    <style>
        html {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
        }
        body {
            margin: 0;
            min-height: 100%;
            background: #1a1a1a;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }
        .content-card-view-nav-layout {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            gap: 8px;
        }
        .content-card-view-nav-left {
            justify-self: start;
            display: flex;
            align-items: center;
        }
        .content-card-view-nav-center {
            justify-self: center;
        }
        .content-card-view-nav-spacer {
            justify-self: end;
            width: 36px;
            height: 36px;
        }
        .content-card-view-back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: #2f3238;
            color: #fff;
            text-decoration: none;
            border: 1px solid #484c55;
            font-size: 18px;
            flex-shrink: 0;
        }
        .content-card-view-back-btn:active {
            background: #3a3f47;
        }
    </style>
    <script>
        window.__CONTENT_CARD_VIEW_ONLY__ = true;
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/static/js/content_editor.js?t={{ cache_timestamp }}"></script>
</head>

<body>
    <!-- Кнопки админа (добавление/удаление кадра и т.д.) — content_editor.js (initContentCardViewOnly + _ensureContentCardAddFrameUi). -->
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        (function () {
            function ensureBackButton() {
                var nav = document.querySelector('#contentCardViewRoot .card-preview-nav');
                if (!nav) return;

                var layout = nav.parentElement && nav.parentElement.classList.contains('content-card-view-nav-layout')
                    ? nav.parentElement
                    : null;
                var leftHost;
                if (!layout) {
                    layout = document.createElement('div');
                    layout.className = 'content-card-view-nav-layout';

                    leftHost = document.createElement('div');
                    leftHost.className = 'content-card-view-nav-left';

                    var centerHost = document.createElement('div');
                    centerHost.className = 'content-card-view-nav-center';

                    var spacer = document.createElement('div');
                    spacer.className = 'content-card-view-nav-spacer';

                    nav.parentNode.insertBefore(layout, nav);
                    layout.appendChild(leftHost);
                    layout.appendChild(centerHost);
                    layout.appendChild(spacer);
                    centerHost.appendChild(nav);
                } else {
                    leftHost = layout.querySelector('.content-card-view-nav-left');
                }

                if (!leftHost) return;
                if (leftHost.querySelector('.content-card-view-back-btn')) return;

                var link = document.createElement('a');
                link.className = 'content-card-view-back-btn';
                link.href = '/cards-cabinet';
                link.setAttribute('aria-label', 'Назад в кабинет карточек');
                link.setAttribute('title', 'Назад в кабинет');
                link.innerHTML = '<i class="fa fa-mail-reply" aria-hidden="true"></i>';
                link.addEventListener('click', function (e) {
                    e.preventDefault();
                    window.location.assign('/cards-cabinet');
                });

                leftHost.appendChild(link);
            }

            ensureBackButton();
            var observer = new MutationObserver(function () {
                ensureBackButton();
            });
            observer.observe(document.body, { childList: true, subtree: true });
        })();
    </script>
</body>

</html>
