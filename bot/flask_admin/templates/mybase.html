{% extends 'appbuilder/baselayout.html' %}

{% block head %}
{{ super() }}
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
{% endblock %}

{% block head_css %}
{{ super() }}
<link rel="stylesheet" href="{{url_for('static',filename='css/mobile_responsive.css')}}">
{% endblock %}

{% block head_js %}
{{ super() }}
<script>
    (function () {
        function closestGroup(el) {
            if (!el || !el.closest) return null;
            return el.closest(".form-group, .control-group, .field-box");
        }

        function getPromoTypeField() {
            return (
                document.querySelector('[name="promocode_type"]') ||
                document.querySelector('[id$="promocode_type"]')
            );
        }

        function getDurationField() {
            return (
                document.querySelector('[name="duration_days"]') ||
                document.querySelector('[id$="duration_days"]')
            );
        }

        function isCardsTypeValue(v) {
            var value = String(v || "").trim().toLowerCase();
            return value === "cards";
        }

        function togglePromoDuration() {
            var promoType = getPromoTypeField();
            var duration = getDurationField();
            if (!promoType || !duration) return;

            var group = closestGroup(duration);
            if (!group) return;

            var isCards = isCardsTypeValue(promoType.value);
            group.style.display = isCards ? "none" : "";
            if (isCards) {
                duration.value = "";
            }
        }

        function bind() {
            togglePromoDuration();
        }

        // FAB иногда дорисовывает форму после initial load — проверяем несколько раз.
        var attempts = 0;
        var maxAttempts = 30;
        var timer = setInterval(function () {
            bind();
            attempts += 1;
            if (attempts >= maxAttempts) {
                clearInterval(timer);
            }
        }, 300);

        document.addEventListener("DOMContentLoaded", bind);
        document.addEventListener("change", function (e) {
            var target = e.target;
            if (!target) return;
            var name = target.getAttribute("name") || target.getAttribute("id") || "";
            if (name.indexOf("promocode_type") !== -1) {
                togglePromoDuration();
            }
        });
    })();
</script>
{% endblock %}
