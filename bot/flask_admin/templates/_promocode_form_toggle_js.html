<script>
    (function () {
        function byNameOrId(root, key) {
            return (
                root.querySelector('[name="' + key + '"]') ||
                root.querySelector('[id$="' + key + '"]')
            );
        }

        function byLabelText(root, text) {
            var labels = root.querySelectorAll("label");
            var needle = String(text || "").toLowerCase();
            for (var i = 0; i < labels.length; i++) {
                var lbl = labels[i];
                var t = String(lbl.textContent || "").toLowerCase();
                if (t.indexOf(needle) === -1) continue;

                var forId = lbl.getAttribute("for");
                if (forId) {
                    var direct = root.querySelector("#" + CSS.escape(forId));
                    if (direct) return direct;
                }
                var wrap = fieldContainerFor(lbl) || lbl.parentElement;
                if (wrap) {
                    var input = wrap.querySelector("select, input");
                    if (input) return input;
                }
            }
            return null;
        }

        function fieldContainerFor(el) {
            return el && el.closest
                ? el.closest(".form-group, .control-group, .field-box, .formField")
                : null;
        }

        function findPromoTypeField(root) {
            var direct = byNameOrId(root, "promocode_type");
            if (direct) return direct;
            var byLabel = byLabelText(root, "тип промокода");
            if (byLabel) return byLabel;

            var selects = root.querySelectorAll("select");
            for (var i = 0; i < selects.length; i++) {
                var s = selects[i];
                var values = Array.prototype.map.call(s.options || [], function (o) {
                    var v = String(o.value || "").toLowerCase();
                    var tx = String(o.textContent || "").toLowerCase();
                    return v + " " + tx;
                });
                var hasCards = values.some(function (v) {
                    return v.indexOf("cards") !== -1 || v.indexOf("карточ") !== -1;
                });
                var hasRegular = values.some(function (v) {
                    return v.indexOf("regular") !== -1 || v.indexOf("обыч") !== -1;
                });
                if (hasCards && hasRegular) return s;
            }
            return null;
        }

        function findDurationField(root) {
            return (
                byNameOrId(root, "duration_days") ||
                byLabelText(root, "длительность")
            );
        }

        function currentPromoTypeToken(promoTypeField) {
            if (!promoTypeField) return "";
            if (promoTypeField.tagName === "SELECT") {
                var idx = promoTypeField.selectedIndex;
                var opt = idx >= 0 ? promoTypeField.options[idx] : null;
                var ov = opt ? String(opt.value || "") : "";
                var ot = opt ? String(opt.textContent || "") : "";
                return (ov + " " + ot).toLowerCase();
            }
            return String(promoTypeField.value || "").toLowerCase();
        }

        function isCards(valueToken) {
            var v = String(valueToken || "").toLowerCase();
            return v.indexOf("cards") !== -1 || v.indexOf("карточ") !== -1;
        }

        function setFieldVisible(el, visible) {
            var container = fieldContainerFor(el);
            if (container) {
                container.style.display = visible ? "" : "none";
                return;
            }
            el.style.display = visible ? "" : "none";
        }

        function applyToggle(root) {
            root = root || document;
            var promoType = findPromoTypeField(root);
            var duration = findDurationField(root);
            if (!promoType || !duration) return;

            var hide = isCards(currentPromoTypeToken(promoType));
            setFieldVisible(duration, !hide);
            if (hide) {
                duration.value = "";
            }
        }

        function init() {
            applyToggle(document);

            document.addEventListener("change", function (e) {
                var t = e.target;
                if (!t) return;
                var idOrName = String(t.name || t.id || "").toLowerCase();
                if (idOrName.indexOf("promocode_type") !== -1 || t.tagName === "SELECT") {
                    applyToggle(document);
                }
            });

            var observer = new MutationObserver(function () {
                applyToggle(document);
            });
            observer.observe(document.body, { childList: true, subtree: true });
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
        } else {
            init();
        }
    })();
</script>
